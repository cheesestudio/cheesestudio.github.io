      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2 + 1,
        speed: Math.random() * 20 + 10
      });
    }

    // ============ METEORS ============
    const meteors = [];

    function spawnMeteor() {
      meteors.push({
        x: Math.random() * canvas.width,
        y: -20,
        length: Math.random() * 40 + 30,
        speed: Math.random() * 250 + 150, // 更快
        angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
        brightness: Math.random() * 0.2 + 0.1, // 更暗
        trail: []
      });
    }

    function updateMeteors(dt) {
      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.x += Math.cos(m.angle) * m.speed * dt;
        m.y += Math.sin(m.angle) * m.speed * dt;
        m.trail.push({ x: m.x, y: m.y });
        if (m.trail.length > 8) m.trail.shift(); // 更短拖尾
        if (m.y > canvas.height + 50 || m.x > canvas.width + 50) {
          meteors.splice(i, 1);
        }
      }
      if (Math.random() < 0.008) spawnMeteor(); // 更少
    }

    function renderMeteors() {
      for (const m of meteors) {
        // 模糊长拖尾
        ctx.save();
        ctx.globalAlpha = m.brightness;
        ctx.fillStyle = 'rgba(200, 220, 255, 0.05)';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#aaddff';

        // 流星本体为长条形
        ctx.beginPath();
        ctx.moveTo(m.x - Math.cos(m.angle) * 5, m.y - Math.sin(m.angle) * 5);
        ctx.lineTo(m.x + Math.cos(m.angle) * 25, m.y + Math.sin(m.angle) * 25);
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(220, 240, 255, 0.3)';
        ctx.stroke();

        // 细小光点
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(m.x, m.y, 1, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    // ============ VIGNETTE EFFECT ============
    function renderVignette() {
      const gradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, canvas.height * 0.3,
        canvas.width / 2, canvas.height / 2, canvas.height * 0.9
      );
      gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0.6)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // ============ SCREEN FLASH ============
    let screenFlash = { intensity: 0, color: '#fff' };

    // ============ BOMB SLASH EFFECT ============
    let bombSlash = { active: false, x: -200, speed: 1500 };

    function activateBombSlash() {
      bombSlash.active = true;
      bombSlash.x = -canvas.width;
    }

    function updateBombSlash(dt) {
      if (bombSlash.active) {
        bombSlash.x += bombSlash.speed * dt;

        // Destroy bullets in slash path - sweep across screen
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (b.owner === 'boss' && Math.abs(b.x - bombSlash.x) < 50) {
            bullets.splice(i, 1);
            // Small explosion effect at hit
            for (let j = 0; j < 3; j++) {
              spawnParticle(b.x, b.y, b.color);
            }
          }
        }

        if (bombSlash.x > canvas.width + 200) {
          bombSlash.active = false;
        }
      }
    }

    function renderBombSlash() {
      if (!bombSlash.active) return;
      ctx.save();
      const x = bombSlash.x;

      // Main slash line
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 8;
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#00ffff';
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();

      // Secondary slash
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x - 20, 0);
      ctx.lineTo(x - 20, canvas.height);
      ctx.stroke();

      // Slash trail glow
      const gradient = ctx.createLinearGradient(x - 100, 0, x + 50, 0);
      gradient.addColorStop(0, 'transparent');
      gradient.addColorStop(0.5, 'rgba(0, 255, 255, 0.3)');
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.fillRect(x - 100, 0, 150, canvas.height);

      ctx.restore();
    }

    function triggerScreenFlash(intensity, color = '#fff') {
      screenFlash.intensity = intensity;
      screenFlash.color = color;
    }

    function updateScreenFlash(dt) {
      if (screenFlash.intensity > 0) {
        screenFlash.intensity -= dt * 3;
        if (screenFlash.intensity < 0) screenFlash.intensity = 0;
      }
    }

    function renderScreenFlash() {
      if (screenFlash.intensity > 0) {
        ctx.fillStyle = screenFlash.color;
        ctx.globalAlpha = screenFlash.intensity * 0.3;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
      }
    }

    // ============ SPARKLE PARTICLES ============
    const sparkles = [];

    function spawnSparkle(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        sparkles.push({
          x, y,
          vx: Math.cos(angle) * (50 + Math.random() * 50),
          vy: Math.sin(angle) * (50 + Math.random() * 50),
          life: 0.5 + Math.random() * 0.3,
          color,
          size: 2 + Math.random() * 2
        });
      }
    }

    function updateSparkles(dt) {
      for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.life -= dt;
        if (s.life <= 0) sparkles.splice(i, 1);
      }
    }

    function renderSparkles() {
      for (const s of sparkles) {
        ctx.save();
        ctx.globalAlpha = s.life * 2;
        ctx.fillStyle = s.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * s.life * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ============ BULLET TRAILS ============
    const bulletTrails = [];

    function addBulletTrail(bullet) {
      bulletTrails.push({
        x: bullet.x,
        y: bullet.y,
        color: bullet.color,
        life: 0.3,
        size: bullet.r
      });
    }

    function updateBulletTrails(dt) {
      for (let i = bulletTrails.length - 1; i >= 0; i--) {
        bulletTrails[i].life -= dt;
        if (bulletTrails[i].life <= 0) bulletTrails.splice(i, 1);
      }
    }

    function renderBulletTrails() {
      for (const t of bulletTrails) {
        ctx.save();
        ctx.globalAlpha = t.life * 3;
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.size * 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ============ BACKGROUND PULSE ============
    let bgPulse = 0;

    function spawnParticle(x, y, color) {
      for (let i = 0; i < 5; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 100,
          vy: (Math.random() - 0.5) * 100,
          life: 0.5,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function renderParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life * 2;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
      }
      ctx.globalAlpha = 1;
    }

    function renderBackground() {
      // Animated grid with wave effect
      const time = Date.now() / 1000;
      ctx.strokeStyle = '#1a1a3a';
      ctx.lineWidth = 1;
      for (let x = 0; x <= canvas.width; x += 40) {
        ctx.beginPath();
        const offset = Math.sin(time + x * 0.01) * 5;
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Multi-layer parallax stars
      for (const s of stars) {
        s.y += s.speed * 0.016;
        if (s.y > canvas.height) {
          s.y = 0;
          s.x = Math.random() * canvas.width;
        }

        // Different brightness based on layer
        const alpha = 0.2 + s.s / 5;
        const size = s.s;

        // Twinkling effect
        const twinkle = Math.sin(time * 3 + s.x * 0.1) * 0.3 + 0.7;

        // Draw star with glow
        if (s.speed > 20) {
          // Foreground stars - brighter, bigger
          ctx.fillStyle = `rgba(200, 220, 255, ${alpha * twinkle})`;
          ctx.shadowBlur = 8;
          ctx.shadowColor = '#ffffff';
        } else {
          // Background stars - dimmer
          ctx.fillStyle = `rgba(150, 150, 180, ${alpha * twinkle * 0.5})`;
          ctx.shadowBlur = 0;
        }
        ctx.beginPath();
        ctx.arc(s.x, s.y, size * twinkle, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Ambient particles floating
      if (Math.random() < 0.05) {
        ambientParticles.push({
          x: Math.random() * canvas.width,
          y: canvas.height + 10,
          vx: (Math.random() - 0.5) * 20,
          vy: -10 - Math.random() * 20,
          r: 1 + Math.random() * 2,
          life: 3 + Math.random() * 2,
          color: ['#00ffff', '#ff00ff', '#00ff88'][Math.floor(Math.random() * 3)]
        });
      }

      for (let i = ambientParticles.length - 1; i >= 0; i--) {
        const p = ambientParticles[i];
        p.x += p.vx * 0.016;
        p.y += p.vy * 0.016;
        p.life -= 0.016;
        if (p.life <= 0) {
          ambientParticles.splice(i, 1);
          continue;
        }
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // ============ GAME STATES ============
    let highScore = localStorage.getItem('bulletHellHigh') || 0;

    // ============ LEADERBOARD ============
    const MAX_LEADERBOARD_ENTRIES = 10;
    let leaderboard = [];
    let currentPage = 'MENU'; // MENU, LEADERBOARD

    function loadLeaderboard() {
      try {
        const data = localStorage.getItem('bulletHellLeaderboard');
        leaderboard = data ? JSON.parse(data) : [];
      } catch (e) {
        leaderboard = [];
      }
    }

    function saveLeaderboard() {
      localStorage.setItem('bulletHellLeaderboard', JSON.stringify(leaderboard));
    }

    function addToLeaderboard(name, score, wave) {
      leaderboard.push({ name, score, wave, date: Date.now() });
      leaderboard.sort((a, b) => b.score - a.score);
      leaderboard = leaderboard.slice(0, MAX_LEADERBOARD_ENTRIES);
      saveLeaderboard();

      // Update high score
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('bulletHellHigh', highScore);
      }
    }

    loadLeaderboard();

    // ============ SCREEN SHAKE ============
    let screenShake = { x: 0, y: 0, intensity: 0, time: 0 };

    function triggerScreenShake(intensity = 3, duration = 0.1) {
      screenShake.intensity = intensity;
      screenShake.time = duration;
    }

    function updateScreenShake(dt) {
      if (screenShake.time > 0) {
        screenShake.time -= dt;
        screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
        screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
      } else {
        screenShake.x = 0;
        screenShake.y = 0;
      }
    }

    // ============ EXPLOSION PARTICLES ============
    const explosionParticles = [];

    function spawnExplosion(x, y, color, count = 40) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed = 100 + Math.random() * 200;
        explosionParticles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 3 + Math.random() * 4,
          life: 0.5 + Math.random() * 0.5,
          color
        });
      }
    }

    function updateExplosionParticles(dt) {
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const p = explosionParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        p.r *= 0.98;
        if (p.life <= 0) explosionParticles.splice(i, 1);
      }
    }

    function renderExplosionParticles() {
      for (const p of explosionParticles) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, p.life);
        ctx.shadowBlur = 15;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ============ DYNAMIC HEALTH BAR ============
    let displayHp = 100;

    function updateDisplayHp(dt) {
      if (!boss.active) return;
      const diff = boss.hp - displayHp;
      if (Math.abs(diff) > 0.5) {
        displayHp += diff * 10 * dt;
      } else {
        displayHp = boss.hp;
      }
    }

    // ============ SCORE POPUPS ============
    const scorePopups = [];

    function spawnScorePopup(x, y, value) {
      scorePopups.push({
        x, y,
        value,
        vy: -80,
        life: 0.6,
        scale: 1
      });
    }

    function updateScorePopups(dt) {
      for (let i = scorePopups.length - 1; i >= 0; i--) {
        const p = scorePopups[i];
        p.y += p.vy * dt;
        p.life -= dt;
        p.scale = 1 + (0.6 - p.life) * 0.5;
        if (p.life <= 0) scorePopups.splice(i, 1);
      }
    }

    function renderScorePopups() {
      for (const p of scorePopups) {
        ctx.save();
        const alpha = Math.min(1, p.life * 2);

        // Background glow
        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 30);
        gradient.addColorStop(0, `rgba(255, 255, 0, ${alpha * 0.5})`);
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(p.x - 30, p.y - 30, 60, 60);

        // Main text with color based on value
        let color = '#ffff00';
        if (p.value >= 100) color = '#ff00ff';
        else if (p.value >= 50) color = '#ff6600';
        else if (p.value >= 20) color = '#00ff00';

        ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.font = `bold ${18 * p.scale}px "Courier New", monospace`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        ctx.fillText(`+${p.value}`, p.x, p.y);

        // Small sparkle effect
        if (p.life > 0.3) {
          const sparkleAngle = Date.now() / 100;
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = alpha * 0.8;
          for (let i = 0; i < 3; i++) {
            const angle = sparkleAngle + (i / 3) * Math.PI * 2;
            const sx = p.x + Math.cos(angle) * 15;
            const sy = p.y + Math.sin(angle) * 10;
            ctx.fillRect(sx, sy, 2, 2);
          }
        }
        ctx.restore();
      }
    }

    // ============ COMBO SYSTEM ============
    let combo = 0;
    let comboTimer = 0;
    const COMBO_TIME = 2.0;

    function updateCombo(dt) {
      if (comboTimer > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) {
          combo = 0;
        }
      }
    }

    function addCombo() {
      combo++;
      comboTimer = COMBO_TIME;
    }

    function renderCombo() {
      if (combo >= 2) {
        ctx.save();
        const time = Date.now() / 1000;
        const scale = 1 + Math.min(combo * 0.08, 0.6);
        const comboY = 70 + Math.sin(time * 8) * 3;

        // Combo glow background
        const gradient = ctx.createRadialGradient(canvas.width/2, comboY, 0, canvas.width/2, comboY, 80);
        gradient.addColorStop(0, 'rgba(255, 102, 0, 0.3)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(canvas.width/2 - 100, comboY - 50, 200, 100);

        // Main combo text
        ctx.fillStyle = '#ff6600';
        ctx.font = `bold ${24 * scale}px "Courier New", monospace`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff6600';

        // Combo counter with animation
        const comboPulse = 1 + Math.sin(time * 10) * 0.1;
        ctx.save();
        ctx.translate(canvas.width / 2, comboY);
        ctx.scale(comboPulse, comboPulse);
        ctx.fillText(`${combo}x COMBO!`, 0, 0);
        ctx.restore();

        ctx.restore();
      }
    }

    function updateMenu(dt) {
      // Toggle leaderboard view
      if (isDown('l') || isDown('L')) {
        currentPage = currentPage === 'MENU' ? 'LEADERBOARD' : 'MENU';
      }

      if (isDown(' ') || isDown('Enter')) {
        startGame();
      }
    }

    function updateGameOver(dt) {
      if (isDown(' ') || isDown('Enter')) {
        startGame();
      }

      // Save to leaderboard
      if ((isDown('s') || isDown('S')) && score > 0) {
        addToLeaderboard('PILOT', score, waveCount);
        gameState = STATE.MENU;
        currentPage = 'MENU';
      }
    }

    function updatePause(dt) {
      if (isDown(' ') || isDown('Escape')) {
        gameState = STATE.PLAYING;
      }
      if (isDown('r') || isDown('R')) {
        startGame();
      }
      if (isDown('s') || isDown('S')) {
        gameState = STATE.SETTINGS;
      }
      if (isDown('q') || isDown('Q')) {
        gameState = STATE.MENU;
      }
    }

    function updateSettings(dt) {
      if (isDown('Escape')) {
        gameState = STATE.PAUSED;
      }

      // Navigation
      if (isDown('ArrowDown') && !keys['ArrowDown_pressed']) {
        keys['ArrowDown_pressed'] = true;
        selectedSetting = (selectedSetting + 1) % 6;
      }
      if (isDown('ArrowUp') && !keys['ArrowUp_pressed']) {
        keys['ArrowUp_pressed'] = true;
        selectedSetting = (selectedSetting - 1 + 6) % 6;
      }

      // Change values
      if (isDown('ArrowLeft') || isDown('ArrowRight')) {
        switch(selectedSetting) {
          case 0: difficulty = (difficulty + (isDown('ArrowRight') ? 1 : -1) + 3) % 3; break;
          case 1: screenShakeEnabled = !screenShakeEnabled; break;
          case 2: particlesEnabled = !particlesEnabled; break;
          case 3: crtEffectEnabled = !crtEffectEnabled; break;
          case 4: soundEnabled = !soundEnabled; break;
          case 5: musicEnabled = !musicEnabled; break;
        }
      }
    }

    function startGame() {
      clearAllTimers();
      score = 0;
      graze = 0;
      combo = 0;
      gameTime = 0;
      displayHp = 100;
      player.lives = 3;
      player.power = 0;
      player.x = canvas.width / 2;
      player.y = canvas.height - 80;
      player.bombReady = true;
      player.bombCooldown = 0;
      powerups.length = 0;
      minions.length = 0;
      bossIndex = 0;
      waveCount = 1;
      startBoss();
      gameState = STATE.PLAYING;
    }

    function renderMenu() {
      if (currentPage === 'LEADERBOARD') {
        renderLeaderboard();
        return;
      }

      // Animated title with pulsing glow
      const time = Date.now() / 1000;
      const pulseScale = 1 + Math.sin(time * 2) * 0.05;

      ctx.save();
      ctx.translate(canvas.width/2, canvas.height/2 - 40);
      ctx.scale(pulseScale, pulseScale);
      ctx.shadowBlur = 20 + Math.sin(time * 3) * 10;
      ctx.shadowColor = '#00ffff';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '30px monospace';
      ctx.fillText('BULLET HELL', 0, 0);
      ctx.restore();

      ctx.fillStyle = '#ff00ff';
      ctx.textAlign = 'center';
      ctx.font = '16px monospace';
      ctx.fillText('BOSS RUSH', canvas.width/2, canvas.height/2 - 10);

      // Blinking "PRESS SPACE"
      if (Math.floor(time * 2) % 2 === 0) {
        ctx.fillStyle = '#00ffff';
        ctx.font = '16px monospace';
        ctx.fillText('PRESS SPACE TO START', canvas.width/2, canvas.height/2 + 40);
      }

      ctx.fillStyle = '#888';
      ctx.font = '12px monospace';
      ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width/2, canvas.height/2 + 80);

      // Show leaderboard hint
      ctx.fillStyle = '#666';
      ctx.fillText('PRESS L FOR LEADERBOARD', canvas.width/2, canvas.height - 30);
      ctx.textAlign = 'left';
    }

    function renderPauseMenu() {
      const time = Date.now() / 1000;

      // Dark overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(canvas.width/2, canvas.height/2 - 60);
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff00ff';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '32px monospace';
      ctx.fillText('PAUSED', 0, 0);
      ctx.restore();

      ctx.fillStyle = '#00ffff';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[SPACE] RESUME', canvas.width/2, canvas.height/2);
      ctx.fillText('[R] RESTART GAME', canvas.width/2, canvas.height/2 + 30);
      ctx.fillText('[S] SETTINGS', canvas.width/2, canvas.height/2 + 60);
      ctx.fillText('[Q] QUIT TO MENU', canvas.width/2, canvas.height/2 + 90);

      ctx.fillStyle = '#666';
      ctx.font = '12px monospace';
      ctx.fillText(`SCORE: ${score} | WAVE: ${waveCount} | TIME: ${Math.floor(gameTime)}s`, canvas.width/2, canvas.height - 30);
    }

    function renderSettings() {
      const time = Date.now() / 1000;

      ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(canvas.width/2, 60);
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#00ffff';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '28px monospace';
      ctx.fillText('SETTINGS', 0, 0);
      ctx.restore();

      ctx.fillStyle = '#fff';
      ctx.font = '16px monospace';
      ctx.textAlign = 'left';
      const startX = canvas.width/2 - 200;

      // Settings items
      const items = [
        { name: 'Difficulty', value: ['EASY', 'NORMAL', 'HARD'][difficulty] },
        { name: 'Screen Shake', value: screenShakeEnabled ? 'ON' : 'OFF' },
        { name: 'Particles', value: particlesEnabled ? 'ON' : 'OFF' },
        { name: 'CRT Effect', value: crtEffectEnabled ? 'ON' : 'OFF' },
        { name: 'Sound Effects', value: soundEnabled ? 'ON' : 'OFF' },
        { name: 'Music', value: musicEnabled ? 'ON' : 'OFF' }
      ];

      for (let i = 0; i < items.length; i++) {
        const y = 120 + i * 45;
        ctx.fillStyle = '#fff';
        ctx.fillText(items[i].name, startX, y);
        ctx.fillStyle = selectedSetting === i ? '#00ffff' : '#888';
        ctx.textAlign = 'right';
        ctx.fillText(`[${items[i].value}]`, startX + 400, y);
        ctx.textAlign = 'left';
      }

      ctx.fillStyle = '#666';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[↑/↓] SELECT  [←/→] CHANGE  [ESC] BACK', canvas.width/2, canvas.height - 40);
    }

    function renderLeaderboard() {
      const time = Date.now() / 1000;

      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '30px monospace';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#00ffff';
      ctx.fillText('LEADERBOARD', canvas.width/2, 80);
      ctx.shadowBlur = 0;

      if (leaderboard.length === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '16px monospace';
        ctx.fillText('NO SCORES YET', canvas.width/2, 150);
      } else {
        ctx.textAlign = 'left';
        const startX = canvas.width/2 - 150;
        for (let i = 0; i < leaderboard.length; i++) {
          const entry = leaderboard[i];
          const y = 130 + i * 35;

          // Rank
          ctx.fillStyle = i === 0 ? '#ffd700' : (i === 1 ? '#c0c0c0' : (i === 2 ? '#cd7f32' : '#888'));
          ctx.font = 'bold 18px monospace';
          ctx.fillText(`${i + 1}.`, startX, y);

          // Name
          ctx.fillStyle = '#fff';
          ctx.font = '16px monospace';
          ctx.fillText(entry.name, startX + 35, y);

          // Score
          ctx.fillStyle = '#00ffff';
          ctx.textAlign = 'right';
          ctx.fillText(`${entry.score}`, startX + 220, y);

          // Wave
          ctx.fillStyle = '#888';
          ctx.font = '12px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(`W${entry.wave}`, startX + 280, y);
          ctx.textAlign = 'left';
        }
      }

      // Back hint
      if (Math.floor(time * 2) % 2 === 0) {
        ctx.fillStyle = '#00ffff';
        ctx.textAlign = 'center';
        ctx.font = '14px monospace';
        ctx.fillText('PRESS L TO BACK', canvas.width/2, canvas.height - 40);
      }
      ctx.textAlign = 'left';
    }

    function renderGameOver() {
      const time = Date.now() / 1000;

      // Animated background with pulse
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Glitch effect on GAME OVER text
      const glitchOffset = Math.random() > 0.9 ? (Math.random() - 0.5) * 10 : 0;

      ctx.fillStyle = '#ff4444';
      ctx.textAlign = 'center';
      ctx.font = '30px monospace';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ff0000';
      ctx.fillText('GAME OVER', canvas.width/2 + glitchOffset, canvas.height/2 - 40);
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#ff8800';
      ctx.font = '16px monospace';
      ctx.fillText(`REACHED WAVE ${waveCount}`, canvas.width/2, canvas.height/2 - 10);

      // Score count-up animation effect
      const displayScore = Math.min(score, Math.floor(time * 50) % (score + 100));
      ctx.fillStyle = '#fff';
      ctx.font = '20px monospace';
      ctx.fillText(`SCORE: ${displayScore}`, canvas.width/2, canvas.height/2 + 20);

      if (score > highScore) {
        localStorage.setItem('bulletHellHigh', score);
        highScore = score;
        ctx.fillStyle = '#00ffff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ffff';
        ctx.fillText('NEW HIGH SCORE!', canvas.width/2, canvas.height/2 + 50);
        ctx.shadowBlur = 0;
      }

      // Blinking restart text
      if (Math.floor(time * 2) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '14px monospace';
        ctx.fillText('PRESS SPACE TO RESTART', canvas.width/2, canvas.height/2 + 90);
      }

      // Save to leaderboard hint
      ctx.fillStyle = '#666';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PRESS S TO SAVE SCORE', canvas.width/2, canvas.height/2 + 115);

      // Contact info
      ctx.fillStyle = '#555';
      ctx.font = '13px monospace';
      ctx.fillText('QQ: 2190038793  |  WX: cheesemost', canvas.width/2, canvas.height/2 + 150);

      // Github project link
      ctx.fillStyle = '#444';
      ctx.font = '12px monospace';
      ctx.fillText('github.com/cheesestudio/bullet-hell-game', canvas.width/2, canvas.height/2 + 170);

      ctx.textAlign = 'left';
    }

    // ============ GAME UPDATE/RENDER ============
    function update(dt) {
      gameTime += dt;
      bgPulse += dt * 2;
      updateScreenShake(dt);
      updateScreenFlash(dt);
      updateBombSlash(dt);
      updatePlayer(dt);
      updateRegen(dt);
      updateBullets(dt);
      updatePowerups(dt);
      updateMinions(dt);
      updateBoss(dt);
      checkBossAbilities(dt);
      updateLaser(dt);
      updateMeteors(dt);
      updateParticles(dt);
      updateSparkles(dt);
      updateBulletTrails(dt);
      updateExplosionParticles(dt);
      updateDisplayHp(dt);
      updateScorePopups(dt);
      updateCombo(dt);
      checkPlayerHit();
      checkBossHit();
      checkMinionHit();
    }

    function render() {
      ctx.save();
      ctx.translate(screenShake.x, screenShake.y);

      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
      renderBackground();
      renderMeteors();
      renderBulletTrails();
      renderSparkles();

      switch(gameState) {
        case STATE.MENU:
          renderMenu();
          break;
        case STATE.PLAYING:
          renderExplosionParticles();
          renderScorePopups();
          renderParticles();
          renderBullets();
          renderPowerups();
          renderMinions();
          if (boss.active) {
            renderBoss();
            renderBossAbilities();
          }
          renderPlayer();
          renderUI();
          renderCombo();
          renderScreenFlash();
          renderBombSlash();
          renderVignette();
          break;
        case STATE.GAMEOVER:
          renderExplosionParticles();
          renderParticles();
          renderBullets();
          renderGameOver();
          break;
        case STATE.PAUSED:
          renderBackground();
          renderMeteors();
          renderBulletTrails();
          renderSparkles();
          renderParticles();
          renderBullets();
          if (boss.active) renderBoss();
          renderPlayer();
          renderUI();
          renderVignette();
          renderCombo();
          renderPauseMenu();
          break;
        case STATE.SETTINGS:
          renderSettings();
          break;
      }

      ctx.restore();
    }

    function renderPauseScreen() {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const time = Date.now() / 1000;
      ctx.fillStyle = '#00ffff';
      ctx.font = '40px monospace';
      ctx.textAlign = 'center';
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00ffff';
      ctx.fillText('PAUSED', canvas.width/2, canvas.height/2 - 30);
      ctx.shadowBlur = 0;

      ctx.font = '14px monospace';
      ctx.fillStyle = '#888';
      ctx.fillText('ARROWS/WASD: MOVE    |    ESC: RESUME', canvas.width/2, canvas.height/2 + 20);

      if (Math.floor(time * 2) % 2 === 0) {
        ctx.fillStyle = '#fff';
        ctx.fillText('PRESS ESC TO RESUME', canvas.width/2, canvas.height/2 + 60);
      }
      ctx.textAlign = 'left';
    }

    // ============ AUDIO (OPTIONAL) ============
    let audioCtx = null;

    function playSound(type) {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { return; }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'shoot') {
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }
      else if (type === 'hit') {
        osc.frequency.value = 220;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      }
    }

    // =====================================================
    // DG-LAB COYOTE SOCKET INTEGRATION
    // =====================================================
    let coyoteWs = null;
    let coyoteConnected = false;
    let coyoteEnabled = false;
    let coyoteCooldown = 0;
    let coyoteIntensity = 0.3; // Global intensity multiplier 0-1

    const COYOTE_COOLDOWN = 0.03; // 30ms minimum between pulses

    function coyoteTrigger(eventType) {
      if (!coyoteEnabled || !coyoteConnected || coyoteCooldown > 0) return;

      let msg;
      switch(eventType) {
        case 'playerHit':
          msg = "strength-1+1+15 strength-2+1+8";
          coyoteCooldown = COYOTE_COOLDOWN;
          break;
        case 'powerup':
          msg = "strength-1+1+5 strength-2+1+3";
          coyoteCooldown = 0.15;
          break;
        case 'bossWarning':
          msg = "strength-1+1+10 strength-2+1+7";
          coyoteCooldown = 0.12;
          break;
        case 'gameOver':
          msg = "strength-1+2+12 strength-2+2+8";
          coyoteCooldown = 0.25;
          break;
      }

      if (coyoteWs && coyoteWs.readyState === 1) {
        coyoteWs.send(JSON.stringify({
          type: 4,
          message: msg,
          clientId: "game-client",
          targetId: ""
        }));
      }
    }

    function coyoteUpdate(dt) {
      if (coyoteCooldown > 0) {
        coyoteCooldown -= dt;
      }
    }

    // Hook into game loop
    const originalGameLoop = gameLoop;
    gameLoop = function(dt) {
      coyoteUpdate(dt);
      originalGameLoop(dt);
    }

    requestAnimationFrame(gameLoop);

    // Auto resize handling
    function handleResize() {
      // Force browser to recalculate canvas layout
      canvas.style.display = 'none';
      canvas.offsetHeight; // Trigger reflow
      canvas.style.display = 'block';
    }

    window.addEventListener('resize', handleResize);
    window.addEventListener('orientationchange', handleResize);
  </script>
