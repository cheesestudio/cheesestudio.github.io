<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bullet Hell Boss Rush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1024" height="768"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Game states
    const STATE = { MENU: 0, PLAYING: 1, TRANSITION: 2, GAMEOVER: 3, PAUSED: 4, SETTINGS: 5 };
    let gameState = STATE.MENU;
    let lastTime = 0;
    let gameTime = 0;
    let graze = 0;

    // Settings
    let difficulty = 1; // 0=EASY, 1=NORMAL, 2=HARD
    let selectedSetting = 0;
    let screenShakeEnabled = true;
    let particlesEnabled = true;
    let crtEffectEnabled = true;
    let soundEnabled = true;
    let musicEnabled = true;

    let showHud = true;
    let bossHealthBar = 0;
    let bossMaxHealth = 100;

    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      // Clamp delta time to prevent teleportation on slow frames
      const clampedDt = Math.min(dt, 0.05);

      // Update
      switch(gameState) {
        case STATE.PLAYING: update(clampedDt); break;
        case STATE.MENU: updateMenu(clampedDt); break;
        case STATE.GAMEOVER: updateGameOver(clampedDt); break;
        case STATE.PAUSED: updatePause(clampedDt); break;
        case STATE.SETTINGS: updateSettings(clampedDt); break;
      }

      // Toggle pause
      if (keys['Escape'] && !keys['Escape_pressed']) {
        keys['Escape_pressed'] = true;
        if (gameState === STATE.PLAYING) {
          gameState = STATE.PAUSED;
        } else if (gameState === STATE.PAUSED) {
          gameState = STATE.PLAYING;
        }
      }

      // Developer mode: K key toggle invincible
      if (keys['k'] && !keys['k_pressed']) {
        keys['k_pressed'] = true;
        player.invincible = player.invincible > 0 ? 0 : 999999;
        triggerScreenFlash(0.2, player.invincible > 0 ? '#00ff00' : '#ff0000');
      }

      // Render
      render();

      requestAnimationFrame(gameLoop);
    }

    // ============ INPUT SYSTEM ============
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => {
      keys[e.key] = false;
      if (e.key === 'Escape') keys['Escape_pressed'] = false;
      if (e.key === 'k' || e.key === 'K') keys['k_pressed'] = false;
    });

    function isDown(key) {
      return keys[key] || keys[key.toLowerCase()];
    }

    // ============ TOUCH CONTROLS ============
    let touchX = null;
    let touchY = null;
    let touching = false;

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      touchX = (touch.clientX - rect.left) * scaleX;
      touchY = (touch.clientY - rect.top) * scaleY;
      touching = true;

      // Start game on touch
      if (gameState === STATE.MENU || gameState === STATE.GAMEOVER) {
        startGame();
      }
      // Activate bomb on double tap
      if (gameState === STATE.PLAYING && player.bombReady) {
        activateBomb();
      }
    }, { passive: false });

    function activateBomb() {
      player.bombReady = false;
      player.bombCooldown = BOMB_COOLDOWN;
      player.invincible = 3;
      bullets.length = 0;
      activateBombSlash();
      if (boss.active) {
        boss.hp -= 50;
        score += 50;
        spawnScorePopup(boss.x, boss.y - 30, 50);
        triggerScreenShake(6, 0.15);
      }
    }

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      touchX = (touch.clientX - rect.left) * scaleX;
      touchY = (touch.clientY - rect.top) * scaleY;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      touching = false;
      touchX = null;
      touchY = null;
    }, { passive: false });

    function getTouchInput() {
      if (!touching || touchX === null || touchY === null) return null;
      return { x: touchX, y: touchY };
    }

    // ============ PLAYER ============
    const player = {
      x: canvas.width / 2,
      y: canvas.height - 80,
      w: 24,
      h: 32,
      r: 12,
      speed: 200,
      shootCooldown: 0,
      shootRate: 0.2,
      invincible: 0,
      lives: 3,
      score: 0,
      power: 0,
      maxPower: 4,
      grazeTime: 0,
      bombCooldown: 0,
      bombReady: true
    };

    const BOMB_COOLDOWN = 60; // 60 seconds

    // ============ POWER-UPS ============
    const powerups = [];
    const POWERUP_TYPES = [
      { name: 'POWER', color: '#ff0066', symbol: 'P', glow: '#ff0066' },
      { name: 'SCORE', color: '#ffcc00', symbol: 'S', glow: '#ffcc00' },
      { name: 'BOMB', color: '#00ff66', symbol: 'B', glow: '#00ff66' },
      { name: 'LIFE', color: '#ff4444', symbol: '❤', glow: '#ff6666' },
      { name: 'SHIELD', color: '#00ccff', symbol: '◈', glow: '#00ccff' },
      { name: 'RAPID', color: '#ff6600', symbol: '⚡', glow: '#ff8800' }
    ];

    function spawnPowerup(x, y) {
      // Weight types based on wave - early game more SCORE/BOMB, later more POWER/SHIELD
      const rand = Math.random();
      let type;
      if (waveCount <= 2) {
        // Early: mostly SCORE, some BOMB, rare POWER/SHIELD
        if (rand < 0.45) type = POWERUP_TYPES[1]; // SCORE
        else if (rand < 0.75) type = POWERUP_TYPES[2]; // BOMB
        else if (rand < 0.88) type = POWERUP_TYPES[0]; // POWER
        else type = POWERUP_TYPES[4]; // SHIELD
      } else if (waveCount <= 5) {
        // Mid: mix of all
        if (rand < 0.35) type = POWERUP_TYPES[1]; // SCORE
        else if (rand < 0.6) type = POWERUP_TYPES[2]; // BOMB
        else if (rand < 0.8) type = POWERUP_TYPES[0]; // POWER
        else type = POWERUP_TYPES[4]; // SHIELD
      } else {
        // Later: more POWER, SHIELD, LIFE
        if (rand < 0.25) type = POWERUP_TYPES[1]; // SCORE
        else if (rand < 0.45) type = POWERUP_TYPES[2]; // BOMB
        else if (rand < 0.65) type = POWERUP_TYPES[0]; // POWER
        else if (rand < 0.8) type = POWERUP_TYPES[4]; // SHIELD
        else type = POWERUP_TYPES[3]; // LIFE
      }
      powerups.push({
        x, y,
        vx: (Math.random() - 0.5) * 30,
        vy: 30,
        r: 8,
        type,
        life: 8
      });
    }

    function updatePowerups(dt) {
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        // Attract to player when close
        const dx = player.x - p.x;
        const dy = player.y - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 80 && gameState === STATE.PLAYING) {
          p.x += (dx / dist) * 150 * dt;
          p.y += (dy / dist) * 150 * dt;
        }

        // Collect
        if (dist < player.r + p.r && gameState === STATE.PLAYING) {
          applyPowerup(p.type);
          spawnScorePopup(p.x, p.y, 50);
          score += 50;
          powerups.splice(i, 1);
          continue;
        }

        if (p.y > canvas.height + 10 || p.life <= 0) {
          powerups.splice(i, 1);
        }
      }
    }

    function applyPowerup(type) {
      if (type.name === 'POWER' && player.power < player.maxPower) {
        player.power = Math.min(player.power + 1, player.maxPower);
        spawnSparkle(player.x, player.y, '#ff0066');
        triggerScreenFlash(0.3, '#ff0066');
      } else if (type.name === 'SCORE') {
        score += 500;
        spawnSparkle(player.x, player.y, '#ffcc00');
      } else if (type.name === 'BOMB') {
        player.lives = Math.min(player.lives + 1, 5);
        spawnSparkle(player.x, player.y, '#00ff66');
        triggerScreenFlash(0.3, '#00ff66');
      } else if (type.name === 'LIFE') {
        player.lives = Math.min(player.lives + 1, 5);
        spawnSparkle(player.x, player.y, '#ff4444');
        triggerScreenFlash(0.5, '#ff4444');
      } else if (type.name === 'SHIELD') {
        player.invincible = Math.min(player.invincible + 3, 5);
        spawnSparkle(player.x, player.y, '#00ccff');
        triggerScreenFlash(0.3, '#00ccff');
      } else if (type.name === 'RAPID') {
        player.shootRate = Math.max(0.05, player.shootRate - 0.05);
        spawnSparkle(player.x, player.y, '#ff6600');
        triggerScreenFlash(0.2, '#ff6600');
      }
    }

    function renderPowerups() {
      const time = Date.now() / 1000;

      for (const p of powerups) {
        ctx.save();

        // Pulsing glow effect
        const pulse = 1 + Math.sin(time * 6 + p.x) * 0.2;
        const glowSize = p.r * 2.5 * pulse;

        // Outer glow
        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
        gradient.addColorStop(0, p.type.glow + 'aa');
        gradient.addColorStop(0.5, p.type.glow + '44');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(p.x - glowSize, p.y - glowSize, glowSize * 2, glowSize * 2);

        // Rotating ring
        ctx.strokeStyle = p.type.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        const ringAngle = time * 3 + p.y * 0.1;
        ctx.ellipse(p.x, p.y, p.r * 1.5, p.r * 0.8, ringAngle, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = 1;

        // Main shape based on type
        ctx.fillStyle = p.type.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = p.type.glow;

        if (p.type.name === 'POWER') {
          // Diamond shape
          ctx.beginPath();
          ctx.moveTo(p.x, p.y - p.r);
          ctx.lineTo(p.x + p.r, p.y);
          ctx.lineTo(p.x, p.y + p.r);
          ctx.lineTo(p.x - p.r, p.y);
          ctx.closePath();
          ctx.fill();
        } else if (p.type.name === 'SCORE') {
          // Star shape
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
            const len = i % 2 === 0 ? p.r : p.r * 0.5;
            const px = p.x + Math.cos(angle) * len;
            const py = p.y + Math.sin(angle) * len;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
        } else if (p.type.name === 'BOMB') {
          // Hexagon
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
            const px = p.x + Math.cos(angle) * p.r;
            const py = p.y + Math.sin(angle) * p.r;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
        } else if (p.type.name === 'LIFE') {
          // Heart-like
          ctx.beginPath();
          ctx.arc(p.x - 3, p.y - 2, 3, Math.PI, 0);
          ctx.arc(p.x + 3, p.y - 2, 3, Math.PI, 0);
          ctx.lineTo(p.x, p.y + 4);
          ctx.closePath();
          ctx.fill();
        } else if (p.type.name === 'SHIELD') {
          // Diamond with inner circle
          ctx.beginPath();
          ctx.moveTo(p.x, p.y - p.r);
          ctx.lineTo(p.x + p.r, p.y);
          ctx.lineTo(p.x, p.y + p.r);
          ctx.lineTo(p.x - p.r, p.y);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 0.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 0.25, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type.name === 'RAPID') {
          // Lightning bolt shape
          ctx.beginPath();
          ctx.moveTo(p.x + 2, p.y - p.r);
          ctx.lineTo(p.x - 3, p.y);
          ctx.lineTo(p.x + 1, p.y);
          ctx.lineTo(p.x - 2, p.y + p.r);
          ctx.lineTo(p.x + 3, p.y);
          ctx.lineTo(p.x - 1, p.y);
          ctx.closePath();
          ctx.fill();
        } else {
          // Default circle
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }

        // Inner highlight
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(p.x - 2, p.y - 2, p.r * 0.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    function updatePlayer(dt) {
      // Apply black hole gravity
      if (boss.blackHoleActive) {
        const dx = boss.x - player.x;
        const dy = boss.y - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 20) {
          player.x += (dx / dist) * 100 * dt;
          player.y += (dy / dist) * 100 * dt;
        }
      }

      // Apply white hole repulsion
      if (boss.whiteHoleActive) {
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 300) {
          player.x += (dx / dist) * 150 * dt;
          player.y += (dy / dist) * 150 * dt;
        }
      }

      // Movement - keyboard
      if (isDown('ArrowLeft') || isDown('a')) player.x -= player.speed * dt;
      if (isDown('ArrowRight') || isDown('d')) player.x += player.speed * dt;
      if (isDown('ArrowUp') || isDown('w')) player.y -= player.speed * dt;
      if (isDown('ArrowDown') || isDown('s')) player.y += player.speed * dt;

      // Movement - touch
      const touch = getTouchInput();
      if (touch) {
        const dx = touch.x - player.x;
        const dy = touch.y - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 10) {
          const moveSpeed = player.speed * dt;
          player.x += (dx / dist) * Math.min(moveSpeed * 2, dist);
          player.y += (dy / dist) * Math.min(moveSpeed * 2, dist);
        }
      }

      // Clamp to bounds
      player.x = Math.max(player.w/2, Math.min(canvas.width - player.w/2, player.x));
      player.y = Math.max(player.h/2, Math.min(canvas.height - player.h/2, player.y));

      // Auto-fire
      player.shootCooldown -= dt;
      if (player.shootCooldown <= 0) {
        const bulletSpeed = -400 - player.power * 30;
        const bulletColor = player.power >= 2 ? '#00ffff' : '#00aaff';
        shootBullet(player.x, player.y - 16, bulletSpeed, 'player');

        // Extra bullets based on power
        if (player.power >= 1) {
          shootBullet(player.x - 8, player.y - 12, bulletSpeed * 0.95, 'player');
          shootBullet(player.x + 8, player.y - 12, bulletSpeed * 0.95, 'player');
        }
        if (player.power >= 3) {
          shootBullet(player.x - 16, player.y - 8, bulletSpeed * 0.9, 'player');
          shootBullet(player.x + 16, player.y - 8, bulletSpeed * 0.9, 'player');
        }

        player.shootCooldown = player.shootRate;
      }

      // Update graze visual
      if (player.grazeTime > 0) player.grazeTime -= dt;

      // Invincibility frame
      if (player.invincible > 0) player.invincible -= dt;

      // Bomb cooldown
      if (player.bombCooldown > 0) {
        player.bombCooldown -= dt;
        if (player.bombCooldown <= 0) {
          player.bombCooldown = 0;
          player.bombReady = true;
        }
      }

      // Activate bomb
      if ((isDown(' ') || isDown('Shift')) && player.bombReady && player.bombCooldown <= 0 && gameState === STATE.PLAYING) {
        player.bombReady = false;
        player.bombCooldown = BOMB_COOLDOWN;
        player.invincible = 3;
        activateBombSlash();
        if (boss.active) {
          boss.hp -= 50;
          score += 50;
          spawnScorePopup(boss.x, boss.y - 30, 50);
          triggerScreenShake(6, 0.15);
        }
      }
    }

    function renderPlayer() {
      if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

      ctx.save();
      ctx.translate(player.x, player.y);

      // Subtle tilt based on movement direction
      const targetTilt = (keys['ArrowLeft'] || keys['a'] || keys['ArrowRight'] || keys['d']) ?
        ((keys['ArrowLeft'] || keys['a']) ? -0.15 : 0) + ((keys['ArrowRight'] || keys['d']) ? 0.15 : 0) : 0;
      ctx.rotate(targetTilt + Math.sin(Date.now() / 200) * 0.02);

      // Graze glow
      if (player.grazeTime > 0) {
        ctx.shadowBlur = 40;
        ctx.shadowColor = '#ff00ff';
        ctx.strokeStyle = '#ff00ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, player.r + 12, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Engine glow (radial gradient)
      const gradient = ctx.createRadialGradient(0, 18, 0, 0, 18, 30);
      gradient.addColorStop(0, '#00ffff');
      gradient.addColorStop(0.4, '#0088ff');
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 18, 30, 0, Math.PI * 2);
      ctx.fill();

      // Wings
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#00aaff';
      ctx.fillStyle = '#1a3a5a';
      ctx.beginPath();
      ctx.moveTo(-24, 14);
      ctx.lineTo(-12, -6);
      ctx.lineTo(0, -2);
      ctx.lineTo(12, -6);
      ctx.lineTo(24, 14);
      ctx.lineTo(0, 18);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Main body
      ctx.fillStyle = '#2a4a6a';
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(-9, 0);
      ctx.lineTo(-6, 18);
      ctx.lineTo(6, 18);
      ctx.lineTo(9, 0);
      ctx.closePath();
      ctx.fill();

      // Cockpit (glowing)
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#00ffff';
      ctx.fillStyle = '#00ffff';
      ctx.beginPath();
      ctx.ellipse(0, -6, 5, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(0, -9, 2.5, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Nose
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#ffffff';
      ctx.fillStyle = '#4a6a8a';
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(-5, -15);
      ctx.lineTo(5, -15);
      ctx.closePath();
      ctx.fill();

      // Engine flames (triple flame with animation)
      const flicker = Math.random() * 5;
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#00ffff';
      ctx.fillStyle = '#00ffff';
      ctx.beginPath();
      ctx.moveTo(-6, 18);
      ctx.lineTo(0, 30 + flicker);
      ctx.lineTo(6, 18);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#aaffff';
      ctx.beginPath();
      ctx.moveTo(-3, 18);
      ctx.lineTo(0, 25 + flicker);
      ctx.lineTo(3, 18);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(-1.5, 18);
      ctx.lineTo(0, 21 + flicker * 0.5);
      ctx.lineTo(1.5, 18);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    // ============ BULLETS ============
    const bullets = [];

    function shootBullet(x, y, vy, owner, type = 'normal') {
      const color = owner === 'player' ? (player.power >= 2 ? '#00ffff' : '#00aaff') : '#ff4444';

      // Hard limit on bullet count to prevent performance collapse
      const MAX_BULLETS = 200;
      if (bullets.length >= MAX_BULLETS) {
        // Don't spawn new bullets if over limit
        return;
      }

      bullets.push({
        x, y,
        vx: 0,
        vy,
        r: 4,
        owner,
        type,
        color
      });
      // Add bullet trail
      addBulletTrail({ x, y, color, r: 4 });
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // Portal teleportation
        if (boss.portals.length > 0) {
          for (const portal of boss.portals) {
            if (portal.active) {
              const otherPortal = boss.portals.find(p => p !== portal);
              if (otherPortal && otherPortal.active) {
                const dx = b.x - portal.x;
                const dy = b.y - portal.y;
                if (Math.sqrt(dx*dx + dy*dy) < 30) {
                  b.x = otherPortal.x + (Math.random() - 0.5) * 20;
                  b.y = otherPortal.y + (Math.random() - 0.5) * 20;
                }
              }
            }
          }
        }

        // Add trail occasionally
        if (Math.random() < 0.3) {
          addBulletTrail({ x: b.x, y: b.y, color: b.color, r: b.r });
        }

        // Off-screen cleanup
        if (b.y < -20 || b.y > canvas.height + 20 ||
            b.x < -20 || b.x > canvas.width + 20) {
          bullets.splice(i, 1);
        }
      }
    }

    function renderBullets() {
      for (const b of bullets) {
        ctx.save();

        if (b.owner === 'player') {
          // Player bullets - glowing elongated shape with trail
          const gradient = ctx.createLinearGradient(b.x, b.y + b.r * 2, b.x, b.y - b.r * 3);
          gradient.addColorStop(0, b.color + '00');
          gradient.addColorStop(0.5, b.color + '88');
          gradient.addColorStop(1, b.color);
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.moveTo(b.x - b.r * 0.6, b.y - b.r * 2);
          ctx.lineTo(b.x + b.r * 0.6, b.y - b.r * 2);
          ctx.lineTo(b.x + b.r, b.y + b.r);
          ctx.lineTo(b.x - b.r, b.y + b.r);
          ctx.closePath();
          ctx.fill();

          // Core
          ctx.shadowBlur = 15;
          ctx.shadowColor = b.color;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Enemy bullets - glowing circle with inner pattern
          const gradient = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 1.5);
          gradient.addColorStop(0, '#ffffff');
          gradient.addColorStop(0.3, b.color);
          gradient.addColorStop(1, b.color + '44');
          ctx.fillStyle = gradient;
          ctx.shadowBlur = 12;
          ctx.shadowColor = b.color;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fill();

          // Inner ring
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r * 0.5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }
    }

    // ============ COLLISION DETECTION ============
    function circleCollision(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      return dist < (a.r + b.r);
    }

    function playerHit() {
      player.lives--;
      player.invincible = 2;
      spawnExplosion(player.x, player.y, '#ffffff', 20);
      triggerScreenShake(4, 0.1);
      coyoteTrigger('playerHit');

      // Clear all enemy bullets on death
      bullets.length = 0;
      minions.length = 0;

      if (player.lives <= 0) {
        gameState = STATE.GAMEOVER;
        spawnExplosion(player.x, player.y, '#00ffff', 80);
        coyoteTrigger('gameOver');
      }
    }

    // Health regeneration
    let regenTimer = 0;
    const REGEN_INTERVAL = 15; // every 15 seconds
    const MAX_REGEN = 3;

    function updateRegen(dt) {
      if (player.lives < MAX_REGEN) {
        regenTimer += dt;
        if (regenTimer >= REGEN_INTERVAL) {
          regenTimer = 0;
          player.lives++;
        }
      } else {
        regenTimer = 0;
      }
    }

    function checkPlayerHit() {
      if (player.invincible > 0) return;

      // Laser damage
      if (boss.laserActive) {
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const playerDist = Math.sqrt(dx*dx + dy*dy);
        if (playerDist < 400) {
          playerHit();
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.owner !== 'player') {
          // Graze detection (close miss)
          const dx = player.x - b.x;
          const dy = player.y - b.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < player.r + b.r + 8 && dist > player.r + b.r) {
            player.grazeTime = 0.1;
            graze++;
            score += 1;
            b.grazed = true;
          }

          if (circleCollision(player, b)) {
            bullets.splice(i, 1);
            playerHit();
            return;
          }
        }
      }
    }

    // ============ BOSS SYSTEM ============
    let score = 0;
    let lives = 3;

    const boss = {
      x: canvas.width / 2,
      y: 80,
      r: 40,
      hp: 100,
      maxHp: 100,
      phase: 0,
      cooldown: 0,
      pattern: 0,
      active: false,
      entranceTime: 0,
      entranceComplete: false,
      entrancePhase: 0,
      name: '',
      // Ability state
      abilityCooldowns: {
        teleport: 0,
        summon: 0,
        shield: 0,
        charge: 0,
        clone: 0,
        portal: 0,
        blackHole: 0,
        whiteHole: 0,
        laser: 0,
        phantom: 0
      },
      shieldHp: 0,
      clones: [],
      portals: [],
      blackHoleActive: false,
      whiteHoleActive: false,
      laserActive: false,
      laserAngle: 0,
      phantomTankActive: false,
      phantomTankX: 0,
      abilityPhase: 0
    };

    // Boss entrance particles
    const entranceParticles = [];

    const BOSS_PHASES = [
      // VOID - Phase 1
      { name: 'VOID', hp: 100, color: '#ff00ff', pattern: 'laser' },
      { name: 'VOID', hp: 100, color: '#ff00ff', pattern: 'ring' },
      { name: 'VOID', hp: 100, color: '#ff00ff', pattern: 'spiral' },
      // PULSE - Phase 2
      { name: 'PULSE', hp: 120, color: '#00ff00', pattern: 'wave' },
      { name: 'PULSE', hp: 120, color: '#00ff00', pattern: 'wall' },
      { name: 'PULSE', hp: 120, color: '#00ff00', pattern: 'scatter' },
      // CORE - Phase 3
      { name: 'CORE', hp: 150, color: '#ff8800', pattern: 'beam' },
      { name: 'CORE', hp: 150, color: '#ff8800', pattern: 'homing' },
      { name: 'CORE', hp: 150, color: '#ff8800', pattern: 'rain' }
    ];

    const BOSS_PATTERNS = [
      'laser', 'ring', 'spiral', 'wave', 'wall', 'scatter', 'beam', 'homing', 'rain',
      'double_spiral', 'flower', 'cross', 'snake', 'pulse', 'vortex', 'burst', 'helix', 'galaxy', 'chaos',
      'corridor', 'pincer', 'predict', 'helix_spread'
    ];
    const BOSS_COLORS = [
      '#ff00ff', '#00ff00', '#ff8800', '#00ffff', '#ff4444', '#ffff00',
      '#ff0066', '#66ff00', '#8800ff', '#ff6600', '#00ff66', '#6600ff'
    ];
    const BOSS_NAMES = [
      'VOID', 'PULSE', 'CORE', 'NOVA', 'PHANTOM', 'SPECTER',
      'CASCADE', 'VORTEX', 'ECHO', 'STORM', 'DRIFT', 'SURGE'
    ];

    const BOSS_ABILITIES = {
      TELEPORT: { cooldown: 15, triggerHp: 0.8, name: 'TELEPORT' },
      SUMMON: { cooldown: 30, triggerHp: 1.0, name: 'SUMMON' },
      SHIELD: { cooldown: 999, triggerHp: 0.6, name: 'SHIELD' },
      CHARGE: { cooldown: 20, triggerHp: 0.4, name: 'CHARGE' },
      CLONE: { cooldown: 25, triggerHp: 0.5, name: 'CLONE' },
      PORTAL: { cooldown: 45, triggerHp: 1.0, name: 'PORTAL' },
      BLACK_HOLE: { cooldown: 30, triggerHp: 0.3, name: 'BLACK_HOLE' },
      WHITE_HOLE: { cooldown: 25, triggerHp: 0.35, name: 'WHITE_HOLE' },
      LASER: { cooldown: 20, triggerHp: 0.25, name: 'LASER' },
      PHANTOM: { cooldown: 15, triggerHp: 0.2, name: 'PHANTOM' }
    };

    let bossIndex = 0;
    let waveCount = 1;
    const HP_BASE = 200;
    const HP_INCREMENT = 100;

    function startBoss() {
      const waveMultiplier = Math.floor(waveCount / 3);
      const hp = Math.floor((HP_BASE + waveCount * HP_INCREMENT) * (1 + waveMultiplier * 0.3));

      boss.hp = boss.maxHp = hp;
      displayHp = hp;
      boss.phase = (bossIndex % 3);
      boss.pattern = BOSS_PATTERNS[bossIndex % BOSS_PATTERNS.length];
      boss.color = BOSS_COLORS[bossIndex % BOSS_COLORS.length];
      boss.active = true;
      boss.x = canvas.width / 2;
      boss.y = -50;
      boss.entranceTime = 0;
      boss.entranceComplete = false;
      boss.entrancePhase = 0;
      boss.entranceType = boss.pattern;
      boss.scale = 0;
      boss.rotation = 0;
      boss.targetX = canvas.width / 2;
      boss.name = BOSS_NAMES[bossIndex % BOSS_NAMES.length];

      // Warning screen effect
      triggerScreenShake(3, 0.5);
    }

    function updateBoss(dt) {
      if (!boss.active) return;

      // Boss entrance animation - pattern specific
      if (!boss.entranceComplete) {
        boss.entranceTime += dt;
        const targetY = 80;
        const t = boss.entranceTime;

        const p = boss.entranceType;

        // Different animations based on pattern
        if (p === 'laser' || p === 'beam' || p === 'cross') {
          // Slide down fast
          const progress = Math.min(t / 0.8, 1);
          boss.y = -60 + (targetY + 60) * (1 - Math.pow(1 - progress, 2));
          boss.scale = progress;
        }
        else if (p === 'spiral' || p === 'double_spiral' || p === 'helix') {
          // Spiral down
          boss.y = -60 + (targetY + 60) * Math.min(t / 1.5, 1);
          boss.rotation = t * 3;
          boss.scale = Math.min(t * 2, 1);
        }
        else if (p === 'ring' || p === 'flower' || p === 'galaxy') {
          // Expand from center
          const progress = Math.min(t / 1.2, 1);
          boss.y = targetY;
          boss.scale = progress * 1.2;
          boss.x = boss.targetX + Math.sin(t * 5) * 50 * (1 - progress);
        }
        else if (p === 'rain' || p === 'chaos') {
          // Fast drop
          const progress = Math.min(t / 0.5, 1);
          boss.y = -80 + (targetY + 80) * progress;
          boss.scale = 1 + Math.sin(progress * Math.PI) * 0.3;
        }
        else if (p === 'wave' || p === 'pulse') {
          // Bounce down
          const progress = Math.min(t / 1.5, 1);
          const bounce = Math.sin(progress * Math.PI * 2) * 20 * (1 - progress);
          boss.y = -50 + (targetY + 50) * progress + bounce;
          boss.scale = progress;
        }
        else if (p === 'vortex' || p === 'burst') {
          // Spin in
          const progress = Math.min(t / 1.0, 1);
          boss.y = -30 + (targetY + 30) * progress;
          boss.rotation = progress * Math.PI * 2;
          boss.scale = progress;
        }
        else if (p === 'snake' || p === 'homing') {
          // Zigzag approach
          const progress = Math.min(t / 1.8, 1);
          boss.y = -60 + (targetY + 60) * progress;
          boss.x = boss.targetX + Math.sin(progress * Math.PI * 4) * 100 * (1 - progress);
          boss.scale = progress;
        }
        else if (p === 'wall' || p === 'scatter') {
          // Slow descend with sway
          const progress = Math.min(t / 2.0, 1);
          boss.y = -40 + (targetY + 40) * (1 - Math.pow(1 - progress, 0.5));
          boss.x = boss.targetX + Math.sin(progress * Math.PI * 2) * 30;
          boss.scale = 0.5 + progress * 0.5;
        }
        else {
          // Default
          const progress = Math.min(t / 1.5, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          boss.y = -50 + (targetY + 50) * ease;
          boss.scale = progress;
        }

        if (boss.entranceTime >= 1.5 || (p === 'rain' && boss.entranceTime >= 0.5)) {
          boss.entranceComplete = true;
          boss.y = targetY;
          boss.scale = 1;
          boss.rotation = 0;
          boss.x = boss.targetX;
        }
        return; // Don't fire during entrance
      }

      // Charge attack handling
      if (boss.charging) {
        boss.chargeTime += dt;
        if (boss.chargeTime >= 3) {
          for (let i = 0; i < 20; i++) {
            const angle = (i / 20) * Math.PI * 2;
            bullets.push({
              x: boss.x,
              y: boss.y,
              vx: Math.cos(angle) * 200,
              vy: Math.sin(angle) * 200,
              r: 8,
              owner: 'boss',
              color: '#ff0000'
            });
          }
          boss.charging = false;
          triggerScreenShake(8, 0.3);
        }
        return;
      }

      // Pattern-linked movement
      const pattern = boss.pattern;
      if (pattern === 'spiral' || pattern === 'helix' || pattern === 'double_spiral') {
        // Circular movement
        const t = Date.now() / 1000;
        boss.x = canvas.width / 2 + Math.cos(t) * 100;
        boss.y = 80 + Math.sin(t * 2) * 20;
      }
      else if (pattern === 'ring' || pattern === 'flower' || pattern === 'galaxy') {
        // Stationary with slight drift
        boss.x += Math.sin(Date.now() / 500) * 20 * dt;
      }
      else if (pattern === 'snake' || pattern === 'wave') {
        // Z-pattern
        const t = Date.now() / 500;
        boss.x = canvas.width / 2 + Math.sin(t) * 150;
        boss.y = 80 + Math.sin(t * 2) * 30;
      }
      else if (pattern === 'beam' || pattern === 'laser') {
        // Track player X
        const targetX = player.x;
        boss.x += (targetX - boss.x) * 2 * dt;
      }
      else if (pattern === 'rain' || pattern === 'chaos') {
        // Random position shifts
        if (Math.random() < 0.02) {
          boss.x = 100 + Math.random() * (canvas.width - 200);
        }
      }
      else {
        // Default movement (faster as waves increase)
        const speedMult = 1 + waveCount * 0.05;
        boss.x += Math.sin(Date.now() / 1000) * 50 * speedMult * dt;
      }

      boss.cooldown -= dt;
      if (boss.cooldown <= 0) {
        fireBossPattern();
        boss.cooldown = Math.max(0.15, 0.5 - waveCount * 0.02);
      }
    }

    function checkBossAbilities(dt) {
      if (!boss.active) return;

      const hpPercent = boss.hp / boss.maxHp;
      const waveDifficulty = Math.min(waveCount / 10, 1);

      // Update all cooldowns
      for (const key in boss.abilityCooldowns) {
        if (boss.abilityCooldowns[key] > 0) {
          boss.abilityCooldowns[key] -= dt;
        }
      }

      const availableAbilities = Math.floor(waveDifficulty * 10) + 3;

      // 1. TELEPORT - HP < 80%
      if (hpPercent < 0.8 && boss.abilityCooldowns.teleport <= 0 && availableAbilities >= 1) {
        triggerTeleport();
        boss.abilityCooldowns.teleport = 15;
      }

      // 2. SUMMON - Every 30 seconds (only after wave 5)
      if (waveCount >= 5 && boss.abilityCooldowns.summon <= 0 && availableAbilities >= 2) {
        triggerSummon();
        boss.abilityCooldowns.summon = 30;
      }

      // 3. SHIELD - HP < 60% (只触发一次)
      if (hpPercent < 0.6 && boss.shieldHp <= 0 && availableAbilities >= 3 && !boss.shieldUsed) {
        triggerShield();
        boss.shieldUsed = true;
      }

      // 4. CHARGE - HP < 40%
      if (hpPercent < 0.4 && boss.abilityCooldowns.charge <= 0 && availableAbilities >= 4) {
        triggerChargeAttack();
        boss.abilityCooldowns.charge = 20;
      }

      // 5. CLONE - HP < 50%
      if (hpPercent < 0.5 && boss.abilityCooldowns.clone <= 0 && availableAbilities >= 5) {
        triggerClone();
        boss.abilityCooldowns.clone = 25;
      }

      // 6. PORTAL - Every 45 seconds
      if (boss.abilityCooldowns.portal <= 0 && availableAbilities >= 6) {
        triggerPortal();
        boss.abilityCooldowns.portal = 45;
      }

      // 7. BLACK_HOLE - HP < 30%
      if (hpPercent < 0.3 && boss.abilityCooldowns.blackHole <= 0 && availableAbilities >= 7) {
        triggerBlackHole();
        boss.abilityCooldowns.blackHole = 30;
      }

      // 8. WHITE_HOLE - HP < 35%
      if (hpPercent < 0.35 && boss.abilityCooldowns.whiteHole <= 0 && availableAbilities >= 8) {
        triggerWhiteHole();
        boss.abilityCooldowns.whiteHole = 25;
      }

      // 9. LASER - HP < 25%
      if (hpPercent < 0.25 && boss.abilityCooldowns.laser <= 0 && availableAbilities >= 9) {
        triggerLaser();
        boss.abilityCooldowns.laser = 20;
      }

      // 10. PHANTOM - HP < 20%
      if (hpPercent < 0.2 && boss.abilityCooldowns.phantom <= 0 && availableAbilities >= 10) {
        triggerPhantomTank();
        boss.abilityCooldowns.phantom = 15;
      }
    }

    function triggerTeleport() {
      spawnExplosion(boss.x, boss.y, '#ffffff', 20);
      boss.x = canvas.width - boss.x;
      boss.y = 80 + (Math.random() - 0.5) * 60;
      triggerScreenShake(5, 0.2);
      spawnExplosion(boss.x, boss.y, boss.color, 20);
    }

    function triggerSummon() {
      const count = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        minions.push({
          x: 50 + Math.random() * (canvas.width - 100),
          y: -20,
          vx: 20 + Math.random() * 30,
          vy: 50 + Math.random() * 30,
          r: 10,
          hp: 20,
          color: boss.color
        });
      }
    }

    function triggerShield() {
      boss.shieldHp = boss.maxHp * 0.1; // 易碎的护盾,约3发可打破
    }

    function triggerChargeAttack() {
      boss.charging = true;
      boss.chargeTime = 0;
      triggerScreenShake(3, 0.5);
    }

    // Active timers tracking
    let activeTimers = [];

    function safeTimeout(callback, delay) {
      const id = setTimeout(() => {
        callback();
        const idx = activeTimers.indexOf(id);
        if (idx > -1) activeTimers.splice(idx, 1);
      }, delay);
      activeTimers.push(id);
      return id;
    }

    function clearAllTimers() {
      for (const id of activeTimers) clearTimeout(id);
      activeTimers = [];
    }

    function triggerClone() {
      boss.clones = [];
      for (let i = 0; i < 2; i++) {
        boss.clones.push({
          x: boss.x + (Math.random() - 0.5) * 100,
          y: boss.y + (Math.random() - 0.5) * 50,
          alpha: 0.5,
          offset: Math.random() * Math.PI * 2
        });
      }
      safeTimeout(() => { boss.clones = []; }, 5000);
    }

    function triggerPortal() {
      boss.portals = [
        { x: 50, y: canvas.height / 2, active: true },
        { x: canvas.width - 50, y: canvas.height / 2, active: true }
      ];
      safeTimeout(() => { boss.portals = []; }, 8000);
    }

    function triggerBlackHole() {
      boss.blackHoleActive = true;
      boss.blackHolePhase = 'warning';
      boss.blackHoleTimer = 0;
    }

    function triggerWhiteHole() {
      boss.whiteHoleActive = true;
      boss.whiteHolePhase = 'warning';
      boss.whiteHoleTimer = 0;
    }

    function triggerLaser() {
      boss.laserActive = true;
      boss.laserPhase = 'aiming'; // aiming -> locked -> firing -> fading
      boss.laserTimer = 0;
      boss.laserAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
      boss.laserWidth = 0;
    }

    function updateLaser(dt) {
      if (!boss.laserActive || !boss.laserPhase) return;

      boss.laserTimer += dt;
      const phase = boss.laserPhase;

      if (phase === 'aiming') {
        // Track player position
        boss.laserAngle = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.laserWidth = 5;
        // Warning line - thin targeting
        if (boss.laserTimer > 1.5) {
          boss.laserPhase = 'locked';
          boss.laserTimer = 0;
        }
      } else if (phase === 'locked') {
        // Stop aiming, show charge effect
        boss.laserWidth = 8;
        if (boss.laserTimer > 0.5) {
          boss.laserPhase = 'firing';
          boss.laserTimer = 0;
        }
      } else if (phase === 'firing') {
        // Full beam with damage
        boss.laserWidth = Math.min(20, 8 + (boss.laserTimer * 12));
        if (boss.laserTimer > 1.5) {
          boss.laserPhase = 'fading';
          boss.laserTimer = 0;
        }
      } else if (phase === 'fading') {
        // Fade out
        boss.laserWidth = Math.max(0, 20 - (boss.laserTimer * 40));
        if (boss.laserTimer > 0.5 || boss.laserWidth <= 0) {
          boss.laserActive = false;
          boss.laserPhase = null;
        }
      }
    }

    function triggerPhantomTank() {
      boss.phantomTankActive = true;
      boss.phantomTankX = Math.random() > 0.5 ? 50 : canvas.width - 50;
      boss.phantomTankVisible = true;
      setTimeout(() => {
        boss.phantomTankVisible = false;
        bullets.push({
          x: boss.phantomTankX,
          y: 100,
          vx: boss.phantomTankX < canvas.width / 2 ? 200 : -200,
          vy: 150,
          r: 8,
          owner: 'boss',
          color: '#ff0000'
        });
      }, 500);
      safeTimeout(() => { boss.phantomTankActive = false; }, 3000);
    }

    function renderBoss() {
      if (!boss.active) return;

      const time = Date.now() / 1000;

      // Show boss name during entrance
      if (!boss.entranceComplete && boss.name) {
        ctx.save();
        const nameY = 40 + Math.sin(time * 5) * 5;
        ctx.fillStyle = boss.color;
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 15;
        ctx.shadowColor = boss.color;
        ctx.globalAlpha = Math.min(1, boss.entranceTime * 2);
        ctx.fillText(boss.name, boss.x, nameY);
        ctx.font = '12px monospace';
        ctx.globalAlpha = Math.min(1, boss.entranceTime * 2) * 0.7;
        ctx.fillText(`WAVE ${waveCount}`, boss.x, nameY + 18);
        ctx.restore();
      }

      ctx.save();
      ctx.translate(boss.x, boss.y);

      const entranceScale = boss.scale || 1;
      ctx.scale(entranceScale, entranceScale);

      // Dynamic rotation based on pattern
      if (boss.entranceComplete) {
        const rotationSpeed = {
          'spiral': 0.3, 'double_spiral': 0.4, 'helix': 0.35, 'vortex': 0.5,
          'galaxy': 0.2, 'ring': 0.15, 'flower': 0.25, 'pulse': 0.1,
          'burst': 0.6, 'wave': 0.08, 'snake': 0.05, 'homing': 0.12,
          'laser': 0, 'beam': 0, 'cross': 0, 'rain': 0, 'chaos': 0.15, 'wall': 0, 'scatter': 0
        };
        const rotSpeed = rotationSpeed[boss.pattern] || 0;
        if (rotSpeed > 0) {
          ctx.rotate(time * rotSpeed);
        }
      }

      // === LAYER 1: Outer energy field ===
      const energyField = ctx.createRadialGradient(0, 0, boss.r * 0.3, 0, 0, boss.r * 2);
      energyField.addColorStop(0, boss.color + '22');
      energyField.addColorStop(0.5, boss.color + '11');
      energyField.addColorStop(1, 'transparent');
      ctx.fillStyle = energyField;
      ctx.beginPath();
      ctx.arc(0, 0, boss.r * 2, 0, Math.PI * 2);
      ctx.fill();

      // Pulsing outer ring
      const pulse = Math.sin(time * 3) * 0.1 + 1;
      ctx.strokeStyle = boss.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, boss.r * 1.8 * pulse, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // === LAYER 2: Main body (pattern-specific shape) ===
      ctx.shadowBlur = 30;
      ctx.shadowColor = boss.color;
      ctx.fillStyle = boss.color;
      ctx.beginPath();

      const drawPattern = boss.pattern;
      if (drawPattern === 'spiral' || drawPattern === 'double_spiral' || drawPattern === 'helix') {
        // Spiral arm shape
        for (let i = 0; i < 5; i++) {
          const angle = (i / 5) * Math.PI * 2 + time * 0.5;
          const len = boss.r * (0.8 + Math.sin(time * 2 + i) * 0.2);
          ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
        }
        ctx.closePath();
      } else if (drawPattern === 'galaxy' || drawPattern === 'ring' || drawPattern === 'flower') {
        // Multi-layered circle with orbiting nodes
        ctx.arc(0, 0, boss.r * 0.8, 0, Math.PI * 2);
        ctx.closePath();
        // Orbiting nodes
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2 + time;
          const nodeX = Math.cos(angle) * boss.r * 0.5;
          const nodeY = Math.sin(angle) * boss.r * 0.5;
          ctx.moveTo(nodeX + 5, nodeY);
          ctx.arc(nodeX, nodeY, 5, 0, Math.PI * 2);
        }
      } else if (drawPattern === 'vortex' || drawPattern === 'burst') {
        // Vortex/spiral inward shape
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          const len = boss.r * (0.6 + Math.sin(time * 4 + i * 0.5) * 0.3);
          ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
        }
        ctx.closePath();
      } else if (drawPattern === 'snake' || drawPattern === 'homing') {
        // Organic blob shape
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2;
          const wobble = Math.sin(time * 3 + i * 0.8) * boss.r * 0.2;
          const len = boss.r * 0.7 + wobble;
          ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
        }
        ctx.closePath();
      } else if (drawPattern === 'cross') {
        // Cross shape
        ctx.moveTo(-boss.r, 0);
        ctx.lineTo(-boss.r * 0.3, 0);
        ctx.lineTo(-boss.r * 0.3, -boss.r);
        ctx.lineTo(boss.r * 0.3, -boss.r);
        ctx.lineTo(boss.r * 0.3, 0);
        ctx.lineTo(boss.r, 0);
        ctx.lineTo(boss.r * 0.3, 0);
        ctx.lineTo(boss.r * 0.3, boss.r);
        ctx.lineTo(-boss.r * 0.3, boss.r);
        ctx.lineTo(-boss.r * 0.3, 0);
        ctx.closePath();
      } else if (drawPattern === 'pulse' || drawPattern === 'wave') {
        // Breathing circle
        const breathe = Math.sin(time * 2) * 0.15 + 1;
        ctx.arc(0, 0, boss.r * breathe, 0, Math.PI * 2);
        ctx.closePath();
      } else if (drawPattern === 'laser' || drawPattern === 'beam') {
        // Diamond/pointing shape
        ctx.moveTo(0, -boss.r * 1.2);
        ctx.lineTo(boss.r * 0.7, 0);
        ctx.lineTo(0, boss.r * 0.8);
        ctx.lineTo(-boss.r * 0.7, 0);
        ctx.closePath();
      } else if (drawPattern === 'rain' || drawPattern === 'chaos') {
        // Irregular rocky shape
        for (let i = 0; i < 10; i++) {
          const angle = (i / 10) * Math.PI * 2;
          const irregularity = Math.random() ? (Math.sin(time * 5 + i) * 0.2) : 0;
          const len = boss.r * (0.6 + irregularity);
          if (i === 0) ctx.moveTo(Math.cos(angle) * len, Math.sin(angle) * len);
          else ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
        }
        ctx.closePath();
      } else {
        // Default: polygon based on phase
        const sides = 3 + boss.phase;
        for (let i = 0; i < sides; i++) {
          const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
          const px = Math.cos(angle) * boss.r;
          const py = Math.sin(angle) * boss.r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
      }
      ctx.fill();

      // === LAYER 3: Inner details ===
      // Inner pattern
      ctx.fillStyle = '#000000';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(0, 0, boss.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // === LAYER 4: Core ===
      // Glowing core with pulse
      const corePulse = Math.sin(time * 5) * 0.1 + 1;
      const coreGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, boss.r * 0.3 * corePulse);
      coreGradient.addColorStop(0, '#ffffff');
      coreGradient.addColorStop(0.5, boss.color);
      coreGradient.addColorStop(1, boss.color + '00');
      ctx.fillStyle = coreGradient;
      ctx.beginPath();
      ctx.arc(0, 0, boss.r * 0.25 * corePulse, 0, Math.PI * 2);
      ctx.fill();

      // === LAYER 5: Rotating rings/orbits ===
      const ringAngle = time * 2;
      ctx.strokeStyle = boss.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;

      // Primary orbit
      ctx.beginPath();
      ctx.ellipse(0, 0, boss.r * 1.1, boss.r * 0.35, ringAngle, 0, Math.PI * 2);
      ctx.stroke();

      // Secondary orbit (perpendicular)
      ctx.beginPath();
      ctx.ellipse(0, 0, boss.r * 0.35, boss.r * 1.1, ringAngle * 0.7, 0, Math.PI * 2);
      ctx.stroke();

      // Extra rings for specific patterns
      if (['galaxy', 'flower', 'vortex', 'burst'].includes(drawPattern)) {
        ctx.beginPath();
        ctx.ellipse(0, 0, boss.r * 1.3, boss.r * 0.5, ringAngle * 1.3, 0, Math.PI * 2);
        ctx.globalAlpha = 0.3;
        ctx.stroke();
      }

      // Orbiting particles for galaxy pattern
      if (drawPattern === 'galaxy') {
        for (let i = 0; i < 4; i++) {
          const orbitAngle = ringAngle * 1.5 + (i / 4) * Math.PI * 2;
          const orbitX = Math.cos(orbitAngle) * boss.r * 0.9;
          const orbitY = Math.sin(orbitAngle) * boss.r * 0.3;
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = 0.8;
          ctx.beginPath();
          ctx.arc(orbitX, orbitY, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.globalAlpha = 1;

      // === LAYER 6: Energy spikes (for aggressive patterns) ===
      if (['laser', 'beam', 'cross', 'rain'].includes(drawPattern)) {
        ctx.strokeStyle = boss.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.7;
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2 + time;
          const innerR = boss.r * 0.9;
          const outerR = boss.r * 1.3 + Math.sin(time * 8 + i) * 5;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
          ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
          ctx.stroke();
        }
      }

      // Flash effect during entrance
      if (!boss.entranceComplete) {
        ctx.fillStyle = boss.color;
        ctx.globalAlpha = 0.3 + Math.sin(time * 20) * 0.2;
        ctx.fill();
      }

      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function renderBossAbilities() {
      if (!boss.active) return;

      // Shield
      if (boss.shieldHp > 0) {
        ctx.save();
        ctx.translate(boss.x, boss.y);
        ctx.strokeStyle = boss.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 100) * 0.2;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2 + Date.now() / 500;
          const px = Math.cos(angle) * (boss.r + 20);
          const py = Math.sin(angle) * (boss.r + 20);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      // Clones
      for (const clone of boss.clones) {
        ctx.save();
        ctx.globalAlpha = clone.alpha;
        ctx.translate(clone.x + Math.sin(Date.now() / 200 + clone.offset) * 5, clone.y);
        ctx.scale(0.8, 0.8);
        ctx.fillStyle = boss.color;
        ctx.beginPath();
        ctx.arc(0, 0, boss.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Portals
      for (const portal of boss.portals) {
        if (portal.active) {
          ctx.save();
          ctx.translate(portal.x, portal.y);
          const gradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
          gradient.addColorStop(0, '#000000');
          gradient.addColorStop(0.5, '#4400ff');
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(0, 0, 40, 0, Math.PI * 2);
          ctx.fill();
          ctx.rotate(Date.now() / 200);
          ctx.strokeStyle = '#8800ff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 30, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      // Black Hole
      if (boss.blackHoleActive) {
        ctx.save();
        ctx.translate(boss.x, boss.y);
        const gradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 60);
        gradient.addColorStop(0, '#000000');
        gradient.addColorStop(0.3, '#220044');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, 60, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#4400ff';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.ellipse(0, 0, 40 + i * 10, 15, Date.now() / 500 + i, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      // White Hole
      if (boss.whiteHoleActive) {
        ctx.save();
        ctx.translate(boss.x, boss.y);
        const gradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 80);
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(0.3, '#ffff00');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Laser Beam - multi-phase
      if (boss.laserActive) {
        ctx.save();
        ctx.translate(boss.x, boss.y);
        ctx.rotate(boss.laserAngle);

        const w = boss.laserWidth || 0;
        const phase = boss.laserPhase;

        if (phase === 'aiming') {
          // Thin warning line - targeting
          ctx.strokeStyle = '#ff000066';
          ctx.lineWidth = 2;
          ctx.setLineDash([10, 10]);
          ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 50) * 0.3;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(canvas.width, 0);
          ctx.stroke();
          ctx.setLineDash([]);
        } else if (phase === 'locked') {
          // Charging effect - thick warning
          ctx.strokeStyle = '#ff4400';
          ctx.lineWidth = 15;
          ctx.globalAlpha = 0.4;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(canvas.width, 0);
          ctx.stroke();
          // Core
          ctx.strokeStyle = '#ffff00';
          ctx.lineWidth = 6;
          ctx.globalAlpha = 0.8;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(canvas.width, 0);
          ctx.stroke();
          // Central target indicator
          const dist = canvas.width;
          for (let i = 0; i < 3; i++) {
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.arc(dist * 0.9, (i - 1) * 30, 20, 0, Math.PI * 2);
            ctx.stroke();
          }
        } else if (phase === 'firing' || phase === 'fading') {
          // Full laser beam
          const gradient = ctx.createLinearGradient(0, -w, 0, w);
          gradient.addColorStop(0, '#ffffff');
          gradient.addColorStop(0.3, '#ff0000');
          gradient.addColorStop(0.7, '#ff0000');
          gradient.addColorStop(1, '#ffffff');
          ctx.fillStyle = gradient;
          ctx.globalAlpha = 0.9;
          ctx.fillRect(0, -w, canvas.width, w * 2);
          // Outer glow
          ctx.strokeStyle = '#ff8800';
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.6;
          ctx.beginPath();
          ctx.moveTo(0, -w - 5);
          ctx.lineTo(canvas.width, -w - 5);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, w + 5);
          ctx.lineTo(canvas.width, w + 5);
          ctx.stroke();
          // Core
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = 0.9;
          ctx.fillRect(0, -2, canvas.width, 4);
          // Impact flash at end
          ctx.fillStyle = '#ffff00';
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.arc(canvas.width, 0, w * 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      // Phantom Tank
      if (boss.phantomTankActive && boss.phantomTankVisible) {
        ctx.save();
        ctx.translate(boss.phantomTankX, 100);
        ctx.fillStyle = '#444444';
        ctx.fillRect(-15, -10, 30, 20);
        ctx.fillStyle = '#ff0000';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff0000';
        ctx.beginPath();
        ctx.arc(boss.phantomTankX < canvas.width / 2 ? 15 : -15, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Charge warning
      if (boss.charging) {
        ctx.save();
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0000';
        ctx.fillText('WARNING!', canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }
    }

    function fireBossPattern() {
      const p = boss.pattern;

      if (p === 'laser') {
        for (let i = -2; i <= 2; i++) {
          bullets.push({
            x: boss.x + i * 30,
            y: boss.y + 20,
            vx: i * 20,
            vy: 150,
            r: 6,
            owner: 'boss',
            color: '#ff00ff'
          });
        }
      }
      else if (p === 'ring') {
        for (let i = 0; i < 16; i++) {
          const angle = (i / 16) * Math.PI * 2;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(angle) * 120,
            vy: Math.sin(angle) * 120,
            r: 5,
            owner: 'boss',
            color: '#ff00ff'
          });
        }
      }
      else if (p === 'spiral') {
        const angle = Date.now() / 200;
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: Math.cos(angle) * 100,
          vy: Math.sin(angle) * 100,
          r: 4,
          owner: 'boss',
          color: '#ff00ff'
        });
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: Math.cos(angle + Math.PI) * 100,
          vy: Math.sin(angle + Math.PI) * 100,
          r: 4,
          owner: 'boss',
          color: '#ff00ff'
        });
      }
      else if (p === 'wave') {
        const t = Date.now() / 1000;
        for (let i = 0; i < 8; i++) {
          const r = 30 + (t * 50 % 100);
          const angle = (i / 8) * Math.PI * 2;
          bullets.push({
            x: boss.x + Math.cos(angle) * r,
            y: boss.y + Math.sin(angle) * r,
            vx: Math.cos(angle) * 80,
            vy: Math.sin(angle) * 80 + 50,
            r: 5,
            owner: 'boss',
            color: '#00ff00'
          });
        }
      }
      else if (p === 'wall') {
        for (let i = 0; i < 8; i++) {
          bullets.push({
            x: boss.x - 60 + i * 20,
            y: boss.y + 20,
            vx: 0,
            vy: 100,
            r: 5,
            owner: 'boss',
            color: '#00ff00'
          });
        }
      }
      else if (p === 'scatter') {
        for (let i = 0; i < 5; i++) {
          bullets.push({
            x: boss.x + (Math.random() - 0.5) * 100,
            y: boss.y + 20,
            vx: (Math.random() - 0.5) * 150,
            vy: 80 + Math.random() * 50,
            r: 4,
            owner: 'boss',
            color: '#00ff00'
          });
        }
      }
      else if (p === 'beam') {
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: (dx/dist) * 200,
          vy: (dy/dist) * 200,
          r: 6,
          owner: 'boss',
          color: '#ff8800'
        });
      }
      else if (p === 'homing') {
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: (dx/dist) * 100 + (Math.random() - 0.5) * 50,
          vy: (dy/dist) * 100 + (Math.random() - 0.5) * 50,
          r: 5,
          owner: 'boss',
          color: '#ff8800'
        });
      }
      else if (p === 'rain') {
        for (let i = 0; i < 5; i++) {
          bullets.push({
            x: Math.random() * canvas.width,
            y: -10,
            vx: (Math.random() - 0.5) * 30,
            vy: 100 + Math.random() * 50,
            r: 4,
            owner: 'boss',
            color: '#ff8800'
          });
        }
      }
      else if (p === 'double_spiral') {
        const angle = Date.now() / 200;
        for (let j = 0; j < 2; j++) {
          const offset = j * Math.PI;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(angle + offset) * 80,
            vy: Math.sin(angle + offset) * 80 + 50,
            r: 4,
            owner: 'boss',
            color: boss.color
          });
        }
      }
      else if (p === 'flower') {
        const angle = Date.now() / 300;
        for (let i = 0; i < 6; i++) {
          const a = angle + (i / 6) * Math.PI * 2;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(a) * 60,
            vy: Math.sin(a) * 60 + 30,
            r: 5,
            owner: 'boss',
            color: boss.color
          });
        }
      }
      else if (p === 'cross') {
        const angles = [0, Math.PI/2, Math.PI, Math.PI*1.5];
        for (const a of angles) {
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(a) * 150,
            vy: Math.sin(a) * 150,
            r: 6,
            owner: 'boss',
            color: '#ffffff'
          });
        }
      }
      else if (p === 'snake') {
        const t = Date.now() / 100;
        for (let i = 0; i < 5; i++) {
          const offset = i * 15;
          const angle = Math.sin((t + offset) / 20) * Math.PI;
          bullets.push({
            x: boss.x + Math.cos(t / 100 + i) * 30,
            y: boss.y + 20 + i * 15,
            vx: Math.cos(angle) * 80,
            vy: Math.sin(angle) * 80 + 40,
            r: 4,
            owner: 'boss',
            color: boss.color
          });
        }
      }
      else if (p === 'pulse') {
        if (!boss.pulseCount) boss.pulseCount = 0;
        boss.pulseCount++;
        if (boss.pulseCount % 15 === 0) {
          for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            bullets.push({
              x: boss.x,
              y: boss.y,
              vx: Math.cos(angle) * 100,
              vy: Math.sin(angle) * 100,
              r: 5,
              owner: 'boss',
              color: boss.color
            });
          }
        }
      }
      else if (p === 'vortex') {
        const angle = Date.now() / 150;
        const count = 3;
        for (let j = 0; j < count; j++) {
          const a = angle + (j / count) * Math.PI * 2;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(a) * 90,
            vy: Math.sin(a) * 90 + 30,
            r: 4,
            owner: 'boss',
            color: boss.color
          });
        }
      }
      else if (p === 'burst') {
        if (!boss.burstTime) boss.burstTime = 0;
        boss.burstTime += 16;
        if (boss.burstTime % 500 < 20) {
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2 + boss.burstTime / 200;
            bullets.push({
              x: boss.x,
              y: boss.y,
              vx: Math.cos(angle) * 180,
              vy: Math.sin(angle) * 180,
              r: 5,
              owner: 'boss',
              color: boss.color
            });
          }
        }
      }
      else if (p === 'helix') {
        const angle = Date.now() / 250;
        for (let j = 0; j < 3; j++) {
          const a = angle + j * Math.PI * 2 / 3;
          bullets.push({
            x: boss.x + Math.cos(a) * 20,
            y: boss.y,
            vx: Math.cos(a) * 70,
            vy: Math.sin(a) * 70 + 60,
            r: 4,
            owner: 'boss',
            color: j === 0 ? '#ff00ff' : j === 1 ? '#00ffff' : '#ffff00'
          });
        }
      }
      else if (p === 'galaxy') {
        const angle = Date.now() / 400;
        for (let i = 0; i < 5; i++) {
          const a = angle + (i / 5) * Math.PI * 2;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(a) * (50 + i * 15),
            vy: Math.sin(a) * (50 + i * 15) + 20,
            r: 3 + i,
            owner: 'boss',
            color: boss.color
          });
        }
      }
      else if (p === 'chaos') {
        // Random spray with varied speeds
        for (let i = 0; i < 4; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 50 + Math.random() * 100;
          bullets.push({
            x: boss.x + (Math.random() - 0.5) * 30,
            y: boss.y + (Math.random() - 0.5) * 30,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed + 30,
            r: 3 + Math.random() * 4,
            owner: 'boss',
            color: Math.random() > 0.5 ? boss.color : '#ffffff'
          });
        }
      }
      else if (p === 'corridor') {
        const gapX = player.x; // Gap follows player
        for (let i = 0; i < 12; i++) {
          const bx = (i / 12) * canvas.width;
          // Skip bullets near player position (create corridor)
          if (Math.abs(bx - gapX) > 80) {
            bullets.push({
              x: bx,
              y: boss.y + 20,
              vx: 0,
              vy: 120,
              r: 5,
              owner: 'boss',
              color: boss.color
            });
          }
        }
      }
      else if (p === 'pincer') {
        // Left side bullets
        for (let i = 0; i < 5; i++) {
          bullets.push({
            x: -20,
            y: boss.y + i * 30 + 20,
            vx: 150,
            vy: 30,
            r: 5,
            owner: 'boss',
            color: '#ff00ff'
          });
        }
        // Right side bullets
        for (let i = 0; i < 5; i++) {
          bullets.push({
            x: canvas.width + 20,
            y: boss.y + i * 30 + 20,
            vx: -150,
            vy: 30,
            r: 5,
            owner: 'boss',
            color: '#00ffff'
          });
        }
      }
      else if (p === 'predict') {
        // Calculate player's predicted position
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        // Lead by 0.3 seconds
        const leadTime = 0.3;
        const predictX = player.x + (dx / dist) * 100 * leadTime;
        const predictY = player.y + (dy / dist) * 100 * leadTime;

        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: (predictX - boss.x) * 2,
          vy: (predictY - boss.y) * 2,
          r: 6,
          owner: 'boss',
          color: '#ffff00'
        });
      }
      else if (p === 'helix_spread') {
        const angle = Date.now() / 200;
        const colors = ['#ff00ff', '#00ffff', '#ffff00'];
        for (let j = 0; j < 3; j++) {
          const a = angle + j * Math.PI * 2 / 3;
          const speed = 50 + j * 20;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed + 40,
            r: 4 + j,
            owner: 'boss',
            color: colors[j]
          });
        }
      }

      // Spawn minions for certain patterns
      if (['double_spiral', 'flower', 'vortex', 'galaxy'].includes(p)) {
        spawnMinions();
      }
    }

    // ============ MINIONS SYSTEM ============
    const minions = [];

    function spawnMinions() {
      if (minions.length >= 6) return;
      if (Math.random() > 0.3) return;

      const side = Math.random() > 0.5 ? -1 : 1;
      minions.push({
        x: side === -1 ? -20 : canvas.width + 20,
        y: 50 + Math.random() * 150,
        r: 12,
        hp: 1,
        vx: side * (30 + Math.random() * 20),
        vy: (Math.random() - 0.5) * 30,
        color: boss.color,
        type: Math.random() > 0.5 ? 'floater' : 'zigzag'
      });
    }

    function updateMinions(dt) {
      for (let i = minions.length - 1; i >= 0; i--) {
        const m = minions[i];

        // Movement patterns
        if (m.type === 'floater') {
          m.x += m.vx * dt;
          m.y += Math.sin(Date.now() / 300 + i) * 30 * dt;
        } else if (m.type === 'zigzag') {
          m.x += m.vx * dt;
          m.y += m.vy * dt;
          m.vy = Math.sin(Date.now() / 200) * 50;
        }

        // Shoot
        if (Math.random() < 0.02) {
          const dx = player.x - m.x;
          const dy = player.y - m.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          bullets.push({
            x: m.x,
            y: m.y,
            vx: (dx/dist) * 100,
            vy: (dy/dist) * 100,
            r: 4,
            owner: 'minion',
            color: m.color
          });
        }

        // Remove if off screen
        if (m.x < -50 || m.x > canvas.width + 50 || m.y < -50 || m.y > canvas.height + 50) {
          minions.splice(i, 1);
        }
      }
    }

    function renderMinions() {
      for (const m of minions) {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.shadowBlur = 10;
        ctx.shadowColor = m.color;
        ctx.fillStyle = m.color;
        ctx.beginPath();
        if (m.type === 'floater') {
          ctx.arc(0, 0, m.r, 0, Math.PI * 2);
        } else {
          // Diamond shape for zigzag
          ctx.moveTo(0, -m.r);
          ctx.lineTo(m.r, 0);
          ctx.lineTo(0, m.r);
          ctx.lineTo(-m.r, 0);
          ctx.closePath();
        }
        ctx.fill();
        ctx.restore();
      }
    }

    function checkMinionHit() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.owner === 'player') {
          for (let j = minions.length - 1; j >= 0; j--) {
            const m = minions[j];
            const dx = b.x - m.x;
            const dy = b.y - m.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < b.r + m.r) {
              bullets.splice(i, 1);
              minions.splice(j, 1);
              spawnExplosion(m.x, m.y, m.color, 15);
              score += 50;
              spawnScorePopup(m.x, m.y, 50);
              triggerScreenShake(2, 0.03);
              break;
            }
          }
        }
      }
    }

    function checkBossHit() {
      if (!boss.active) return;

      // Shield blocks damage
      if (boss.shieldHp > 0) {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          if (b.owner === 'player' && circleCollision(b, { x: boss.x, y: boss.y, r: boss.r + 25 })) {
            bullets.splice(i, 1);
            boss.shieldHp -= 5;
            spawnSparkle(b.x, b.y, boss.color);
            if (boss.shieldHp <= 0) {
              spawnExplosion(boss.x, boss.y, boss.color, 30);
              triggerScreenShake(3, 0.2);
            }
            return;
          }
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.owner === 'player' && circleCollision(b, boss)) {
          bullets.splice(i, 1);
          boss.hp -= 10;
          score += 10;
          spawnScorePopup(boss.x, boss.y - 30, 10);
          addCombo();
          triggerScreenShake(2, 0.05);

          // Trigger UI hit feedback
          uiFlashTimer = 0.2;
          uiFlashColor = boss.color;

          if (boss.hp <= 0) {
            spawnExplosion(boss.x, boss.y, boss.color, 50);
            triggerScreenShake(6, 0.15);
            triggerScreenFlash(0.8, boss.color);
            // Spawn powerups - increase with waves
            const dropCount = Math.min(1 + Math.floor(waveCount / 3), 6);
            for (let i = 0; i < dropCount; i++) {
              spawnPowerup(boss.x + (Math.random() - 0.5) * 80, boss.y + (Math.random() - 0.5) * 60);
            }
            score += 1000;
            spawnScorePopup(boss.x, boss.y - 30, 1000);
            waveCount++;
            bossIndex++;
            startBoss();
          }
        }
      }
    }

    // ============ ENHANCED UI SYSTEM ============
    let uiFlashTimer = 0;
    let uiFlashColor = '#ff0000';

    function renderUI() {
      const time = Date.now() / 1000;

      // === PLAYER STATUS AREA (Left side) ===
      // Lives with animation
      for (let i = 0; i < player.lives; i++) {
        ctx.save();
        const heartX = 10 + i * 24;
        const heartY = 30;
        // Pulse effect
        const pulse = 1 + Math.sin(time * 4 + i) * 0.1;
        ctx.translate(heartX, heartY);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#ff4466';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ff0000';
        ctx.fillText('❤', 0, 0);
        ctx.restore();
      }

      // Power meter with gradient effect
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(10, 42, 80, 10);
      ctx.strokeStyle = '#333366';
      ctx.lineWidth = 1;
      ctx.strokeRect(10, 42, 80, 10);

      if (player.power > 0) {
        const powerGradient = ctx.createLinearGradient(10, 0, 90, 0);
        powerGradient.addColorStop(0, '#ff0000');
        powerGradient.addColorStop(0.5, '#ff00ff');
        powerGradient.addColorStop(1, '#ff0000');
        ctx.fillStyle = powerGradient;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff0000';
        ctx.fillRect(12, 44, player.power * 14, 6);
        ctx.shadowBlur = 0;
      }

      // Power label
      ctx.fillStyle = '#666';
      ctx.font = '10px monospace';
      ctx.fillText('PWR', 10, 65);

      // Bomb cooldown indicator
      const bombY = canvas.height - 25;
      ctx.fillStyle = '#333';
      ctx.fillRect(10, bombY, 80, 10);
      ctx.strokeStyle = player.bombReady ? '#00ffff' : '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(10, bombY, 80, 10);
      if (player.bombReady) {
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(12, bombY + 2, 76, 6);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 9px monospace';
        ctx.fillText('BOMB READY', 15, bombY + 8);
      } else {
        ctx.fillStyle = '#00aaff';
        ctx.fillRect(12, bombY + 2, 76 * (1 - player.bombCooldown / BOMB_COOLDOWN), 6);
        ctx.fillStyle = '#888';
        ctx.font = '10px monospace';
        ctx.fillText(`${Math.ceil(player.bombCooldown)}s`, 35, bombY + 8);
      }

      // Controls help
      ctx.fillStyle = '#555';
      ctx.font = '10px monospace';
      ctx.fillText('↑↓←→ WASD 移动', 10, 85);
      ctx.fillText('空格/Shift 清屏', 10, 98);
      ctx.fillText('ESC 暂停', 10, 111);
      ctx.fillText('触碰弹幕边缘 擦弹', 10, 124);

      // === BOSS HEALTH BAR (Top Right) ===
      if (boss.active) {
        const barX = canvas.width - 220;
        const barY = 14;
        const barW = 210;
        const barH = 28;

        // BOSS name with glow (pulsing)
        ctx.save();
        ctx.fillStyle = boss.color;
        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.textAlign = 'left';
        ctx.shadowBlur = 15;
        ctx.shadowColor = boss.color;
        const nameGlow = 0.7 + Math.sin(time * 3) * 0.3;
        ctx.globalAlpha = nameGlow;
        if (boss.name) ctx.fillText(boss.name, barX, barY);
        ctx.textAlign = 'right';
        ctx.font = '12px monospace';
        ctx.fillText(`WAVE ${waveCount}`, canvas.width - 8, barY - 2);
        ctx.globalAlpha = 1;
        ctx.restore();

        // Health bar background with border
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(barX, barY + 4, barW, barH);
        ctx.strokeStyle = boss.color + '66';
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY + 4, barW, barH);

        // Health bar damage trail (the darker portion showing damage)
        const hpPercent = Math.max(0, displayHp / boss.maxHp);
        const targetPercent = Math.max(0, boss.hp / boss.maxHp);

        // Red warning flash when hit
        if (uiFlashTimer > 0) {
          uiFlashTimer -= 0.016;
          ctx.fillStyle = uiFlashColor;
          ctx.globalAlpha = 0.3 * (uiFlashTimer / 0.2);
          ctx.fillRect(barX + 2, barY + 6, barW - 4, barH - 4);
          ctx.globalAlpha = 1;
        }

        // Health bar gradient fill (animated shimmer)
        const healthGradient = ctx.createLinearGradient(barX, 0, barX + barW * hpPercent, 0);
        healthGradient.addColorStop(0, boss.color);
        healthGradient.addColorStop(0.5, boss.color + 'cc');
        healthGradient.addColorStop(1, boss.color);

        ctx.fillStyle = healthGradient;
        ctx.shadowBlur = 15;
        ctx.shadowColor = boss.color;

        // Smooth health transition
        const fillW = (barW - 4) * hpPercent;
        ctx.fillRect(barX + 2, barY + 6, fillW, barH - 4);
        ctx.shadowBlur = 0;

        // Health bar shine effect (animated)
        ctx.save();
        const shineX = barX + 2 + (time * 100 % (barW + 60)) - 60;
        const gradient = ctx.createLinearGradient(shineX - 30, 0, shineX + 30, 0);
        gradient.addColorStop(0, 'transparent');
        gradient.addColorStop(0.5, 'rgba(255,255,255,0.3)');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(barX + 2, barY + 6, fillW, barH - 4);
        ctx.restore();

        // HP numbers
        ctx.fillStyle = '#aaa';
        ctx.font = '11px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(`${Math.ceil(boss.hp)} / ${boss.maxHp}`, barX + barW - 4, barY + barH + 11);
        ctx.textAlign = 'left';

        // Critical health warning (low HP flicker)
        if (boss.hp / boss.maxHp < 0.25) {
          ctx.save();
          ctx.globalAlpha = 0.5 + Math.sin(time * 15) * 0.5;
          ctx.fillStyle = '#ff0000';
          ctx.font = 'bold 16px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('⚠ CRITICAL', canvas.width / 2, 80);
          ctx.textAlign = 'left';
          ctx.restore();
        }
      }

      // === SCORE AREA (Bottom Right) ===
      const scoreY = canvas.height - 15;

      // Score with glow
      ctx.save();
      ctx.fillStyle = '#00ffff';
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.textAlign = 'right';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#00ffff';
      // Score increment animation
      const displayScore = score;
      ctx.fillText(`${displayScore}`.padStart(8, '0'), canvas.width - 8, scoreY);
      ctx.shadowBlur = 0;

      // Graze counter
      if (graze > 0) {
        ctx.fillStyle = '#ff66ff';
        ctx.font = '12px monospace';
        ctx.shadowColor = '#ff00ff';
        ctx.shadowBlur = 5;
        ctx.fillText(`GRAZE +${graze}`, canvas.width - 8, scoreY - 20);
      }
      ctx.restore();

      // === WAVE COUNTER (Bottom Left) ===
      ctx.save();
      ctx.fillStyle = '#8888aa';
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText(`WAVE ${waveCount}`, 10, canvas.height - 12);

      // Pause indicator
      if (gameState === STATE.PAUSED) {
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 24px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      }
      ctx.restore();

      ctx.textAlign = 'left';
    }

    // ============ PARTICLES + BACKGROUND ============
    const particles = [];
    const stars = [];
    const ambientParticles = [];
    for (let i = 0; i < 80; i++) {
