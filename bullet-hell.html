<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bullet Hell Boss Rush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      border: 2px solid #1a1a3a;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Game states
    const STATE = { MENU: 0, PLAYING: 1, TRANSITION: 2, GAMEOVER: 3 };
    let gameState = STATE.MENU;
    let lastTime = 0;

    function gameLoop(timestamp) {
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      // Update
      switch(gameState) {
        case STATE.PLAYING: update(dt); break;
        case STATE.MENU: updateMenu(dt); break;
        case STATE.GAMEOVER: updateGameOver(dt); break;
      }

      // Render
      render();

      requestAnimationFrame(gameLoop);
    }

    // ============ INPUT SYSTEM ============
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    function isDown(key) {
      return keys[key] || keys[key.toLowerCase()];
    }

    // ============ PLAYER ============
    const player = {
      x: canvas.width / 2,
      y: canvas.height - 80,
      w: 24,
      h: 32,
      r: 12,
      speed: 200,
      shootCooldown: 0,
      shootRate: 0.2,
      invincible: 0,
      lives: 3,
      score: 0
    };

    function updatePlayer(dt) {
      // Movement
      if (isDown('ArrowLeft') || isDown('a')) player.x -= player.speed * dt;
      if (isDown('ArrowRight') || isDown('d')) player.x += player.speed * dt;
      if (isDown('ArrowUp') || isDown('w')) player.y -= player.speed * dt;
      if (isDown('ArrowDown') || isDown('s')) player.y += player.speed * dt;

      // Clamp to bounds
      player.x = Math.max(player.w/2, Math.min(canvas.width - player.w/2, player.x));
      player.y = Math.max(player.h/2, Math.min(canvas.height - player.h/2, player.y));

      // Auto-fire
      player.shootCooldown -= dt;
      if (player.shootCooldown <= 0) {
        shootBullet(player.x, player.y - 16, -400, 'player');
        player.shootCooldown = player.shootRate;
      }

      // Invincibility frame
      if (player.invincible > 0) player.invincible -= dt;
    }

    function renderPlayer() {
      if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

      ctx.save();
      ctx.translate(player.x, player.y);

      // Glow
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#00ffff';

      // Triangle
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(0, -player.h/2);
      ctx.lineTo(-player.w/2, player.h/2);
      ctx.lineTo(player.w/2, player.h/2);
      ctx.closePath();
      ctx.fill();

      // Tail flame
      ctx.fillStyle = '#00ffff';
      ctx.beginPath();
      ctx.moveTo(-4, player.h/2);
      ctx.lineTo(4, player.h/2);
      ctx.lineTo(0, player.h/2 + 8 + Math.random() * 4);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    // ============ BULLETS ============
    const bullets = [];

    function shootBullet(x, y, vy, owner, type = 'normal') {
      bullets.push({
        x, y,
        vx: 0,
        vy,
        r: 4,
        owner,
        type,
        color: owner === 'player' ? '#00ffff' : '#ff4444'
      });
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;

        // Off-screen cleanup
        if (b.y < -20 || b.y > canvas.height + 20 ||
            b.x < -20 || b.x > canvas.width + 20) {
          bullets.splice(i, 1);
        }
      }
    }

    function renderBullets() {
      for (const b of bullets) {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = b.color;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ============ COLLISION DETECTION ============
    function circleCollision(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      return dist < (a.r + b.r);
    }

    function checkPlayerHit() {
      if (player.invincible > 0) return;

      for (const b of bullets) {
        if (b.owner !== 'player' && circleCollision(player, b)) {
          // Remove bullet
          const idx = bullets.indexOf(b);
          if (idx > -1) bullets.splice(idx, 1);

          // Damage
          player.lives--;
          player.invincible = 2;

          if (player.lives <= 0) {
            gameState = STATE.GAMEOVER;
          }
          return;
        }
      }
    }

    // ============ BOSS SYSTEM ============
    let score = 0;
    let lives = 3;

    const boss = {
      x: canvas.width / 2,
      y: 80,
      r: 40,
      hp: 100,
      maxHp: 100,
      phase: 0,
      cooldown: 0,
      pattern: 0,
      active: false
    };

    const BOSS_PHASES = [
      // VOID - Phase 1
      { name: 'VOID', hp: 100, color: '#ff00ff', pattern: 'laser' },
      { name: 'VOID', hp: 100, color: '#ff00ff', pattern: 'ring' },
      { name: 'VOID', hp: 100, color: '#ff00ff', pattern: 'spiral' },
      // PULSE - Phase 2
      { name: 'PULSE', hp: 120, color: '#00ff00', pattern: 'wave' },
      { name: 'PULSE', hp: 120, color: '#00ff00', pattern: 'wall' },
      { name: 'PULSE', hp: 120, color: '#00ff00', pattern: 'scatter' },
      // CORE - Phase 3
      { name: 'CORE', hp: 150, color: '#ff8800', pattern: 'beam' },
      { name: 'CORE', hp: 150, color: '#ff8800', pattern: 'homing' },
      { name: 'CORE', hp: 150, color: '#ff8800', pattern: 'rain' }
    ];

    let bossIndex = 0;

    function startBoss() {
      const config = BOSS_PHASES[bossIndex];
      boss.hp = boss.maxHp = config.hp;
      boss.phase = bossIndex % 3;
      boss.pattern = config.pattern;
      boss.color = config.color;
      boss.active = true;
      boss.x = canvas.width / 2;
      boss.y = 100;
    }

    function updateBoss(dt) {
      if (!boss.active) return;

      // Simple horizontal movement
      boss.x += Math.sin(Date.now() / 1000) * 50 * dt;

      boss.cooldown -= dt;
      if (boss.cooldown <= 0) {
        fireBossPattern();
        boss.cooldown = 0.5;
      }
    }

    function renderBoss() {
      if (!boss.active) return;

      ctx.save();
      ctx.translate(boss.x, boss.y);
      ctx.shadowBlur = 20;
      ctx.shadowColor = boss.color;

      // Shape based on phase
      ctx.fillStyle = boss.color;
      ctx.beginPath();
      const sides = 3 + boss.phase;
      for (let i = 0; i < sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(angle) * boss.r;
        const py = Math.sin(angle) * boss.r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function fireBossPattern() {
      const p = boss.pattern;

      if (p === 'laser') {
        for (let i = -2; i <= 2; i++) {
          bullets.push({
            x: boss.x + i * 30,
            y: boss.y + 20,
            vx: i * 20,
            vy: 150,
            r: 6,
            owner: 'boss',
            color: '#ff00ff'
          });
        }
      }
      else if (p === 'ring') {
        for (let i = 0; i < 16; i++) {
          const angle = (i / 16) * Math.PI * 2;
          bullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(angle) * 120,
            vy: Math.sin(angle) * 120,
            r: 5,
            owner: 'boss',
            color: '#ff00ff'
          });
        }
      }
      else if (p === 'spiral') {
        const angle = Date.now() / 200;
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: Math.cos(angle) * 100,
          vy: Math.sin(angle) * 100,
          r: 4,
          owner: 'boss',
          color: '#ff00ff'
        });
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: Math.cos(angle + Math.PI) * 100,
          vy: Math.sin(angle + Math.PI) * 100,
          r: 4,
          owner: 'boss',
          color: '#ff00ff'
        });
      }
      else if (p === 'wave') {
        const t = Date.now() / 1000;
        for (let i = 0; i < 8; i++) {
          const r = 30 + (t * 50 % 100);
          const angle = (i / 8) * Math.PI * 2;
          bullets.push({
            x: boss.x + Math.cos(angle) * r,
            y: boss.y + Math.sin(angle) * r,
            vx: Math.cos(angle) * 80,
            vy: Math.sin(angle) * 80 + 50,
            r: 5,
            owner: 'boss',
            color: '#00ff00'
          });
        }
      }
      else if (p === 'wall') {
        for (let i = 0; i < 8; i++) {
          bullets.push({
            x: boss.x - 60 + i * 20,
            y: boss.y + 20,
            vx: 0,
            vy: 100,
            r: 5,
            owner: 'boss',
            color: '#00ff00'
          });
        }
      }
      else if (p === 'scatter') {
        for (let i = 0; i < 5; i++) {
          bullets.push({
            x: boss.x + (Math.random() - 0.5) * 100,
            y: boss.y + 20,
            vx: (Math.random() - 0.5) * 150,
            vy: 80 + Math.random() * 50,
            r: 4,
            owner: 'boss',
            color: '#00ff00'
          });
        }
      }
      else if (p === 'beam') {
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: (dx/dist) * 200,
          vy: (dy/dist) * 200,
          r: 6,
          owner: 'boss',
          color: '#ff8800'
        });
      }
      else if (p === 'homing') {
        const dx = player.x - boss.x;
        const dy = player.y - boss.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        bullets.push({
          x: boss.x,
          y: boss.y,
          vx: (dx/dist) * 100 + (Math.random() - 0.5) * 50,
          vy: (dy/dist) * 100 + (Math.random() - 0.5) * 50,
          r: 5,
          owner: 'boss',
          color: '#ff8800'
        });
      }
      else if (p === 'rain') {
        for (let i = 0; i < 5; i++) {
          bullets.push({
            x: Math.random() * canvas.width,
            y: -10,
            vx: (Math.random() - 0.5) * 30,
            vy: 100 + Math.random() * 50,
            r: 4,
            owner: 'boss',
            color: '#ff8800'
          });
        }
      }
    }

    function checkBossHit() {
      if (!boss.active) return;

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.owner === 'player' && circleCollision(b, boss)) {
          bullets.splice(i, 1);
          boss.hp -= 10;
          score += 10;
          spawnScorePopup(boss.x, boss.y - 30, 10);
          addCombo();
          triggerScreenShake(2, 0.05);

          if (boss.hp <= 0) {
            spawnExplosion(boss.x, boss.y, boss.color, 50);
            triggerScreenShake(6, 0.15);
            bossIndex++;
            if (bossIndex >= BOSS_PHASES.length) {
              boss.active = false;
            } else {
              startBoss();
            }
          }
        }
      }
    }

    function renderUI() {
      // Lives
      ctx.fillStyle = '#ff4444';
      ctx.font = '20px monospace';
      for (let i = 0; i < player.lives; i++) {
        ctx.fillText('❤', 10 + i * 24, 30);
      }

      // Boss health bar with animation
      if (boss.active) {
        ctx.fillStyle = '#222';
        ctx.fillRect(canvas.width - 210, 10, 200, 24);
        const hpPercent = Math.max(0, displayHp / boss.maxHp);
        ctx.fillStyle = boss.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = boss.color;
        ctx.fillRect(canvas.width - 210, 10, 200 * hpPercent, 24);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = boss.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width - 210, 10, 200, 24);
      }

      // Score
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'right';
      ctx.fillText(`SCORE: ${score}`, canvas.width - 10, canvas.height - 10);
      ctx.textAlign = 'left';
    }

    // ============ PARTICLES + BACKGROUND ============
    const particles = [];
    const stars = [];
    for (let i = 0; i < 50; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2 + 1,
        speed: Math.random() * 20 + 10
      });
    }

    function spawnParticle(x, y, color) {
      for (let i = 0; i < 5; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 100,
          vy: (Math.random() - 0.5) * 100,
          life: 0.5,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function renderParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life * 2;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 3, 3);
      }
      ctx.globalAlpha = 1;
    }

    function renderBackground() {
      // Grid
      ctx.strokeStyle = '#1a1a3a';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Stars
      for (const s of stars) {
        s.y += s.speed * 0.016;
        if (s.y > canvas.height) s.y = 0;
        ctx.fillStyle = `rgba(255,255,255,${0.3 + s.s/5})`;
        ctx.fillRect(s.x, s.y, s.s, s.s);
      }
    }

    // ============ GAME STATES ============
    let highScore = localStorage.getItem('bulletHellHigh') || 0;

    // ============ SCREEN SHAKE ============
    let screenShake = { x: 0, y: 0, intensity: 0, time: 0 };

    function triggerScreenShake(intensity = 3, duration = 0.1) {
      screenShake.intensity = intensity;
      screenShake.time = duration;
    }

    function updateScreenShake(dt) {
      if (screenShake.time > 0) {
        screenShake.time -= dt;
        screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
        screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
      } else {
        screenShake.x = 0;
        screenShake.y = 0;
      }
    }

    // ============ EXPLOSION PARTICLES ============
    const explosionParticles = [];

    function spawnExplosion(x, y, color, count = 40) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed = 100 + Math.random() * 200;
        explosionParticles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 3 + Math.random() * 4,
          life: 0.5 + Math.random() * 0.5,
          color
        });
      }
    }

    function updateExplosionParticles(dt) {
      for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const p = explosionParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        p.r *= 0.98;
        if (p.life <= 0) explosionParticles.splice(i, 1);
      }
    }

    function renderExplosionParticles() {
      for (const p of explosionParticles) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, p.life);
        ctx.shadowBlur = 15;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ============ DYNAMIC HEALTH BAR ============
    let displayHp = 100;

    function updateDisplayHp(dt) {
      if (!boss.active) return;
      const diff = boss.hp - displayHp;
      if (Math.abs(diff) > 0.5) {
        displayHp += diff * 10 * dt;
      } else {
        displayHp = boss.hp;
      }
    }

    // ============ SCORE POPUPS ============
    const scorePopups = [];

    function spawnScorePopup(x, y, value) {
      scorePopups.push({
        x, y,
        value,
        vy: -80,
        life: 0.6,
        scale: 1
      });
    }

    function updateScorePopups(dt) {
      for (let i = scorePopups.length - 1; i >= 0; i--) {
        const p = scorePopups[i];
        p.y += p.vy * dt;
        p.life -= dt;
        p.scale = 1 + (0.6 - p.life) * 0.5;
        if (p.life <= 0) scorePopups.splice(i, 1);
      }
    }

    function renderScorePopups() {
      for (const p of scorePopups) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, p.life * 2);
        ctx.fillStyle = '#ffff00';
        ctx.font = `bold ${16 * p.scale}px monospace`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#ffff00';
        ctx.fillText(`+${p.value}`, p.x, p.y);
        ctx.restore();
      }
    }

    // ============ COMBO SYSTEM ============
    let combo = 0;
    let comboTimer = 0;
    const COMBO_TIME = 2.0;

    function updateCombo(dt) {
      if (comboTimer > 0) {
        comboTimer -= dt;
        if (comboTimer <= 0) {
          combo = 0;
        }
      }
    }

    function addCombo() {
      combo++;
      comboTimer = COMBO_TIME;
    }

    function renderCombo() {
      if (combo >= 2) {
        ctx.save();
        const scale = 1 + Math.min(combo * 0.1, 0.5);
        ctx.fillStyle = '#ff6600';
        ctx.font = `bold ${24 * scale}px monospace`;
        ctx.textAlign = 'center';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff6600';
        ctx.fillText(`${combo}x COMBO!`, canvas.width / 2, 70);
        ctx.restore();
      }
    }

    function updateMenu(dt) {
      if (isDown(' ') || isDown('Enter')) {
        startGame();
      }
    }

    function updateGameOver(dt) {
      if (isDown(' ') || isDown('Enter')) {
        startGame();
      }
    }

    function startGame() {
      score = 0;
      combo = 0;
      displayHp = 100;
      player.lives = 3;
      bossIndex = 0;
      startBoss();
      gameState = STATE.PLAYING;
    }

    function renderMenu() {
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = '30px monospace';
      ctx.fillText('BULLET HELL', canvas.width/2, canvas.height/2 - 40);
      ctx.font = '16px monospace';
      ctx.fillText('BOSS RUSH', canvas.width/2, canvas.height/2 - 10);
      ctx.fillStyle = '#00ffff';
      ctx.fillText('PRESS SPACE TO START', canvas.width/2, canvas.height/2 + 40);
      ctx.fillStyle = '#888';
      ctx.font = '12px monospace';
      ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width/2, canvas.height/2 + 80);
      ctx.textAlign = 'left';
    }

    function renderGameOver() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff4444';
      ctx.textAlign = 'center';
      ctx.font = '30px monospace';
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
      ctx.fillStyle = '#fff';
      ctx.font = '20px monospace';
      ctx.fillText(`SCORE: ${score}`, canvas.width/2, canvas.height/2 + 20);
      if (score > highScore) {
        localStorage.setItem('bulletHellHigh', score);
        highScore = score;
        ctx.fillStyle = '#00ffff';
        ctx.fillText('NEW HIGH SCORE!', canvas.width/2, canvas.height/2 + 50);
      }
      ctx.fillStyle = '#888';
      ctx.font = '14px monospace';
      ctx.fillText('PRESS SPACE TO RESTART', canvas.width/2, canvas.height/2 + 90);
      ctx.textAlign = 'left';
    }

    // ============ GAME UPDATE/RENDER ============
    function update(dt) {
      updateScreenShake(dt);
      updatePlayer(dt);
      updateBullets(dt);
      updateBoss(dt);
      updateParticles(dt);
      updateExplosionParticles(dt);
      updateDisplayHp(dt);
      updateScorePopups(dt);
      updateCombo(dt);
      checkPlayerHit();
      checkBossHit();
    }

    function render() {
      ctx.save();
      ctx.translate(screenShake.x, screenShake.y);

      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);
      renderBackground();

      switch(gameState) {
        case STATE.MENU:
          renderMenu();
          break;
        case STATE.PLAYING:
          renderExplosionParticles();
          renderScorePopups();
          renderParticles();
          renderBullets();
          if (boss.active) renderBoss();
          renderPlayer();
          renderUI();
          renderCombo();
          break;
        case STATE.GAMEOVER:
          renderParticles();
          renderBullets();
          renderGameOver();
          break;
      }

      ctx.restore();
    }

    // ============ AUDIO (OPTIONAL) ============
    let audioCtx = null;

    function playSound(type) {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch(e) { return; }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'shoot') {
        osc.frequency.value = 880;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }
      else if (type === 'hit') {
        osc.frequency.value = 220;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      }
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
